<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WB API 文档</title>
<script src="webviewBridge_api_data.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;font-size:14px;line-height:1.5;color:#212529;background:#fff;padding-top:56px}
/* top bar */
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;height:56px;background:#212529;display:flex;align-items:center;padding:0 20px;gap:16px}
.brand{color:#fff;font-size:18px;font-weight:700;white-space:nowrap;letter-spacing:.5px}
.tab-scroll{display:flex;gap:6px;overflow-x:auto;flex:1;scrollbar-width:none;-ms-overflow-style:none;padding:4px 0}
.tab-scroll::-webkit-scrollbar{display:none}
.tab-pill{white-space:nowrap;padding:6px 14px;border-radius:20px;font-size:13px;color:rgba(255,255,255,.7);cursor:pointer;transition:all .2s;user-select:none;border:1px solid transparent}
.tab-pill:hover{color:#fff;background:rgba(255,255,255,.1)}
.tab-pill.active{color:#fff;background:#0d6efd;border-color:#0d6efd}
.search-wrap{position:relative;flex-shrink:0}
.search-wrap input{width:180px;padding:6px 28px 6px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;font-size:13px;outline:none;transition:all .2s}
.search-wrap input::placeholder{color:rgba(255,255,255,.4)}
.search-wrap input:focus{background:rgba(255,255,255,.15);border-color:#0d6efd;width:240px}
.search-wrap .search-icon{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.4);font-size:13px;pointer-events:none}
/* content */
.content{max-width:960px;margin:0 auto;padding:24px 20px 60px}
.section{margin-bottom:32px;scroll-margin-top:72px}
.section-header{display:flex;align-items:baseline;gap:10px;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid #0d6efd}
.section-header h2{font-size:20px;font-weight:700;color:#212529}
.section-header .anchor{font-size:14px;color:#0d6efd;text-decoration:none;opacity:0;transition:opacity .2s}
.section-header:hover .anchor{opacity:1}
.section-header .count{font-size:12px;color:#6c757d;font-weight:400}
/* api card */
.api-card{background:#fff;border:1px solid #e9ecef;border-radius:8px;padding:14px 16px;margin-bottom:10px;transition:border-color .15s}
.api-card:hover{border-color:#0d6efd}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
.card-title{font-size:14px;font-weight:600;color:#0d6efd;white-space:nowrap}
.card-signature{font-family:"SF Mono","Fira Code","Consolas",monospace;font-size:12.5px;color:#1d1d1f;background:#f8f9fa;padding:3px 10px;border-radius:4px;word-break:break-all;flex:1;min-width:0}
.card-desc{font-size:13px;color:#495057;margin-top:8px;line-height:1.6}
.card-desc .desctile{font-weight:600;color:#212529;margin-right:6px}
/* params table */
.params-wrap{margin-top:10px;overflow-x:auto}
.params-table{width:100%;border-collapse:collapse;font-size:12px;min-width:400px}
.params-table th{text-align:left;padding:5px 8px;background:#f8f9fa;color:#6c757d;font-weight:600;border-bottom:1px solid #dee2e6;white-space:nowrap}
.params-table td{padding:5px 8px;border-bottom:1px solid #f0f0f0;vertical-align:top;line-height:1.5}
.params-table td:first-child{font-family:"SF Mono","Fira Code","Consolas",monospace;color:#1d1d1f;white-space:nowrap}
.params-table td:nth-child(2){color:#6c757d;white-space:nowrap}
.params-table td:nth-child(3){color:#212529}
.card-return{font-size:12px;color:#6c757d;margin-top:6px;padding:4px 8px;background:#f8f9fa;border-radius:4px;display:inline-block}
.card-return strong{color:#212529}
/* code details */
.code-details{margin-top:8px}
.code-details summary{font-size:12px;color:#0d6efd;cursor:pointer;display:inline-block;padding:2px 0;user-select:none}
.code-details summary:hover{text-decoration:underline}
.code-block-wrap{position:relative;margin-top:6px}
.code-block{background:#1d1d1f;color:#f8f9fa;padding:12px 14px;border-radius:6px;font-size:12px;font-family:"SF Mono","Fira Code","Consolas",monospace;overflow-x:auto;line-height:1.6;white-space:pre;tab-size:2}
.copy-btn{position:absolute;top:6px;right:6px;padding:4px 10px;font-size:11px;border:none;border-radius:4px;background:rgba(255,255,255,.12);color:rgba(255,255,255,.7);cursor:pointer;transition:all .15s}
.copy-btn:hover{background:rgba(255,255,255,.25);color:#fff}
.copy-btn.copied{background:#198754;color:#fff}
/* inline tables (iconmap, commands) */
.inline-table-wrap{overflow-x:auto;margin-top:8px}
.inline-table{width:100%;border-collapse:collapse;font-size:12px;min-width:500px}
.inline-table th{text-align:left;padding:6px 10px;background:#f8f9fa;color:#6c757d;font-weight:600;border-bottom:2px solid #dee2e6;position:sticky;top:0}
.inline-table td{padding:5px 10px;border-bottom:1px solid #f0f0f0;vertical-align:top;line-height:1.5}
.inline-table tr:hover td{background:#f8f9fa}
.inline-table td:first-child{font-family:"SF Mono","Fira Code","Consolas",monospace;color:#1d1d1f;white-space:nowrap}
.inline-table .cmd-ex{font-family:"SF Mono","Fira Code","Consolas",monospace;font-size:11px;color:#6c757d;word-break:break-all}
/* status badge */
.status-badge{display:inline-block;font-size:11px;padding:1px 6px;border-radius:3px;font-weight:600}
.status-pending{background:#fff3cd;color:#856404}
/* responsive */
@media(max-width:768px){
  .topbar{padding:0 12px;gap:8px}
  .brand{font-size:16px}
  .search-wrap input{width:120px}
  .search-wrap input:focus{width:160px}
  .tab-pill{padding:5px 10px;font-size:12px}
  .content{padding:16px 12px 40px}
  .card-top{flex-direction:column;gap:6px}
  .card-title{white-space:normal}
}
@media(max-width:480px){
  .topbar{flex-wrap:wrap;height:auto;padding:8px 10px;gap:4px}
  .tab-scroll{order:3;width:100%}
  .search-wrap input{width:100px}
  .search-wrap input:focus{width:140px}
  body{padding-top:80px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">WB API</div>
  <div class="tab-scroll" id="tabScroll"></div>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="搜索 API..." autocomplete="off">
    <span class="search-icon">🔍</span>
  </div>
</div>

<div class="content" id="content"></div>

<script>
(function(){
  if(typeof API_DATA === 'undefined'){document.getElementById('content').innerHTML='<p style="padding:40px;color:#dc3545">错误: API_DATA 未加载。请确保 webviewBridge_api_data.js 已引入。</p>';return}
  var D=API_DATA;
  // render tabs
  var tabScroll=document.getElementById('tabScroll');
  D.nav.forEach(function(nav,i){
    var el=document.createElement('span');
    el.className='tab-pill'+(i===0?' active':'');
    el.textContent=nav.title;
    el.dataset.index=i;
    el.addEventListener('click',function(){scrollToSection(nav.keys[0])});
    tabScroll.appendChild(el);
  });
  // render sections
  var content=document.getElementById('content');
  var sectionsHtml='';
  D.nav.forEach(function(nav){
    nav.keys.forEach(function(key){
      var items=D.docs[key];
      if(!items||items.length===0)return;
      var name=D.displayName[key]||key;
      sectionsHtml+='<div class="section" id="section-'+key+'" data-cat="'+key+'">';
      sectionsHtml+='<div class="section-header"><h2>'+escHtml(name)+'</h2><a class="anchor" href="#section-'+key+'">#</a><span class="count">'+items.length+' 个 API</span></div>';
      items.forEach(function(api){
        sectionsHtml+=renderApi(api);
      });
      sectionsHtml+='</div>';
    });
  });
  // iconmap
  if(D.iconMap&&D.iconMap.length){
    sectionsHtml+='<div class="section" id="section-iconmap"><div class="section-header"><h2>图标占位符映射表</h2><a class="anchor" href="#section-iconmap">#</a><span class="count">'+D.iconMap.length+' 项</span></div>';
    sectionsHtml+='<div class="inline-table-wrap"><table class="inline-table"><thead><tr><th>占位符名称</th><th>Emoji</th></tr></thead><tbody>';
    D.iconMap.forEach(function(row){
      sectionsHtml+='<tr><td>'+escHtml(row[0])+'</td><td>'+escHtml(row[1])+'</td></tr>';
    });
    sectionsHtml+='</tbody></table></div></div>';
  }
  // commands
  if(D.commands&&D.commands.length){
    sectionsHtml+='<div class="section" id="section-commands"><div class="section-header"><h2>命令分发处理</h2><a class="anchor" href="#section-commands">#</a><span class="count">'+D.commands.length+' 条命令</span></div>';
    sectionsHtml+='<div class="inline-table-wrap"><table class="inline-table"><thead><tr><th>命令</th><th>说明</th><th>参数映射</th><th>示例</th></tr></thead><tbody>';
    D.commands.forEach(function(cmd){
      sectionsHtml+='<tr><td>'+escHtml(cmd.cmd)+'</td><td>'+escHtml(cmd.desc)+'</td><td>'+escHtml(cmd.maps)+'</td><td><code class="cmd-ex">'+escHtml(cmd.ex)+'</code></td></tr>';
    });
    sectionsHtml+='</tbody></table></div></div>';
  }
  content.innerHTML=sectionsHtml;

  function renderApi(api){
    var h='<div class="api-card">';
    h+='<div class="card-top"><span class="card-title">'+api.sig.replace(/<b class="apiname">/g,'<b class="apiname" style="color:#0d6efd">')+'</span></div>';
    h+='<div class="card-desc">'+api.desc+'</div>';
    if(api.params&&api.params.length){
      h+='<div class="params-wrap"><table class="params-table"><thead><tr><th>参数</th><th>类型</th><th>说明</th></tr></thead><tbody>';
      api.params.forEach(function(p){
        h+='<tr><td>'+escHtml(p.n)+'</td><td>'+escHtml(p.t)+'</td><td>'+escHtml(p.d)+'</td></tr>';
      });
      h+='</tbody></table></div>';
    }
    if(api.ret){
      h+='<div class="card-return"><strong>返回:</strong> '+escHtml(api.ret)+'</div>';
    }
    if(api.exApi||api.exCmd){
      h+='<div class="code-details">';
      if(api.exApi){
        h+='<details><summary>JS 调用示例</summary><div class="code-block-wrap"><pre class="code-block" data-code="'+escAttr(api.exApi)+'">'+escHtml(api.exApi)+'</pre><button class="copy-btn" onclick="copyCode(this)">复制</button></div></details>';
      }
      if(api.exCmd){
        h+='<details><summary>JSON 命令示例</summary><div class="code-block-wrap"><pre class="code-block" data-code="'+escAttr(api.exCmd)+'">'+escHtml(api.exCmd)+'</pre><button class="copy-btn" onclick="copyCode(this)">复制</button></div></details>';
      }
      h+='</div>';
    }
    h+='</div>';
    return h;
  }

  function escHtml(s){if(!s)return '';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
  function escAttr(s){if(!s)return '';return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

  // scroll to section
  window.scrollToSection=function(key){
    var el=document.getElementById('section-'+key);
    if(el){el.scrollIntoView({behavior:'smooth',block:'start'});updateActiveTab(key)}
  }

  function updateActiveTab(key){
    var tabs=tabScroll.querySelectorAll('.tab-pill');
    tabs.forEach(function(t,i){
      t.classList.toggle('active',D.nav[i].keys.indexOf(key)>=0);
    });
  }

  // hash navigation
  function handleHash(){
    var hash=location.hash.replace('#','');
    if(hash&&hash.startsWith('section-')){
      var key=hash.replace('section-','');
      var el=document.getElementById('section-'+key);
      if(el){setTimeout(function(){el.scrollIntoView({behavior:'smooth',block:'start'})},50);updateActiveTab(key)}
    }
  }
  window.addEventListener('hashchange',handleHash);
  if(location.hash)handleHash();

  // scroll spy
  var sectionEls=[];
  function collectSections(){
    sectionEls=[];
    D.nav.forEach(function(nav){
      nav.keys.forEach(function(key){
        var el=document.getElementById('section-'+key);
        if(el)sectionEls.push({el:el,key:key});
      });
    });
  }
  collectSections();

  var scrollTicking=false;
  window.addEventListener('scroll',function(){
    if(!scrollTicking){requestAnimationFrame(function(){onScroll();scrollTicking=false});scrollTicking=true}
  });
  function onScroll(){
    var scrollY=window.scrollY+100;
    var found=null;
    for(var i=sectionEls.length-1;i>=0;i--){
      if(sectionEls[i].el.offsetTop<=scrollY){found=sectionEls[i];break}
    }
    if(found&&found.key){
      var tabs=tabScroll.querySelectorAll('.tab-pill');
      tabs.forEach(function(t,i){
        t.classList.toggle('active',D.nav[i].keys.indexOf(found.key)>=0);
      });
    }
  }

  // search
  var searchInput=document.getElementById('searchInput');
  searchInput.addEventListener('input',function(){
    var q=this.value.trim().toLowerCase();
    var cards=content.querySelectorAll('.api-card');
    var sections=content.querySelectorAll('.section');
    if(!q){
      cards.forEach(function(c){c.style.display=''});
      sections.forEach(function(s){s.style.display=''});
      return;
    }
    cards.forEach(function(c){
      var txt=c.textContent.toLowerCase();
      c.style.display=txt.indexOf(q)>=0?'':'none';
    });
    sections.forEach(function(s){
      var visible=Array.from(s.querySelectorAll('.api-card')).some(function(c){return c.style.display!=='none'});
      var isSpecial=s.id==='section-iconmap'||s.id==='section-commands';
      if(isSpecial){s.style.display=''}else{s.style.display=visible?'':'none'}
    });
  });

  // copy code
  window.copyCode=function(btn){
    var pre=btn.parentElement.querySelector('.code-block');
    if(!pre)return;
    var code=pre.dataset.code||pre.textContent;
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(code).then(function(){
        btn.textContent='已复制!';btn.classList.add('copied');
        setTimeout(function(){btn.textContent='复制';btn.classList.remove('copied')},1500);
      }).catch(function(){fallbackCopy(code,btn)});
    }else{fallbackCopy(code,btn)}
  }
  function fallbackCopy(text,btn){
    var ta=document.createElement('textarea');
    ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();
    try{document.execCommand('copy');btn.textContent='已复制!';btn.classList.add('copied');setTimeout(function(){btn.textContent='复制';btn.classList.remove('copied')},1500)}
    catch(e){btn.textContent='复制失败'}
    document.body.removeChild(ta);
  }

  // fix code blocks: ensure data-code has the exact content
  document.querySelectorAll('.code-block').forEach(function(pre){
    if(!pre.dataset.code){pre.dataset.code=pre.textContent}
  });
})();
</script>
</body>
</html>
