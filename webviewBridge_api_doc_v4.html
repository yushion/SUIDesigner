<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebView Bridge API 文档</title>
<script src="webviewBridge_api_data.js"></script>
<style>
/* ===== Reset & Base ===== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:#0a0a0f}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#00f5d4,#7c3aed);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:linear-gradient(180deg,#00d4b8,#6d28d9)}
::selection{background:rgba(0,245,212,.3);color:#fff}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0a0a0f;color:#e2e8f0;line-height:1.7;min-height:100vh;overflow-x:hidden}

/* ===== Animated Background Orbs ===== */
.bg-orbs{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.15;animation:orbFloat 20s ease-in-out infinite}
.orb:nth-child(1){width:600px;height:600px;background:#00f5d4;top:-200px;left:-100px;animation-delay:0s}
.orb:nth-child(2){width:500px;height:500px;background:#7c3aed;top:30%;right:-150px;animation-delay:-5s}
.orb:nth-child(3){width:400px;height:400px;background:#00f5d4;bottom:-100px;left:40%;animation-delay:-10s}
.orb:nth-child(4){width:350px;height:350px;background:#7c3aed;top:60%;left:-80px;animation-delay:-15s}
@keyframes orbFloat{
  0%,100%{transform:translate(0,0) scale(1)}
  25%{transform:translate(80px,-60px) scale(1.1)}
  50%{transform:translate(-40px,80px) scale(.9)}
  75%{transform:translate(60px,40px) scale(1.05)}
}

/* ===== Top Bar ===== */
.topbar{position:fixed;top:0;left:0;right:0;height:64px;z-index:1000;background:rgba(10,10,15,.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;padding:0 24px;gap:16px}
.topbar-logo{display:flex;align-items:center;gap:12px;flex-shrink:0}
.topbar-logo .logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#00f5d4,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#0a0a0f}
.topbar-logo h1{font-size:16px;font-weight:700;background:linear-gradient(135deg,#00f5d4,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap}
.topbar-logo .version{font-size:11px;color:#94a3b8;background:rgba(255,255,255,.06);padding:2px 8px;border-radius:4px;white-space:nowrap}
.hamburger{width:36px;height:36px;border:none;background:rgba(255,255,255,.06);border-radius:8px;color:#e2e8f0;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.hamburger:hover{background:rgba(255,255,255,.12)}
.topbar-search{flex:1;max-width:400px;position:relative}
.topbar-search input{width:100%;padding:8px 14px 8px 36px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.06);color:#e2e8f0;font-size:13px;outline:none;transition:all .2s}
.topbar-search input:focus{border-color:rgba(0,245,212,.4);background:rgba(255,255,255,.08);box-shadow:0 0 20px rgba(0,245,212,.1)}
.topbar-search input::placeholder{color:#64748b}
.topbar-search .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#64748b;font-size:14px;pointer-events:none}
.topbar-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.topbar-actions .stat-badge{padding:4px 12px;border-radius:6px;background:rgba(0,245,212,.1);border:1px solid rgba(0,245,212,.2);font-size:12px;color:#00f5d4;white-space:nowrap}

/* ===== Navigation Drawer ===== */
.drawer-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:999;opacity:0;pointer-events:none;transition:opacity .3s ease}
.drawer-overlay.active{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;left:0;width:280px;height:100vh;z-index:1001;background:rgba(15,15,25,.92);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-right:1px solid rgba(255,255,255,.08);transform:translateX(-100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden}
.drawer.active{transform:translateX(0)}
.drawer-header{padding:20px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.drawer-header h2{font-size:15px;font-weight:600;color:#e2e8f0}
.drawer-close{width:32px;height:32px;border:none;background:rgba(255,255,255,.06);border-radius:6px;color:#94a3b8;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.drawer-close:hover{background:rgba(255,255,255,.1);color:#e2e8f0}
.drawer-search{padding:12px 16px;flex-shrink:0}
.drawer-search input{width:100%;padding:7px 12px;border-radius:6px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#e2e8f0;font-size:13px;outline:none;transition:all .2s}
.drawer-search input:focus{border-color:rgba(0,245,212,.3)}
.drawer-search input::placeholder{color:#64748b}
.drawer-body{flex:1;overflow-y:auto;padding:12px 0}
.drawer-section{margin-bottom:4px}
.drawer-section-title{padding:8px 20px 4px;font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:1px}
.drawer-item{display:block;padding:8px 20px;color:#94a3b8;font-size:13px;text-decoration:none;transition:all .15s;border-left:3px solid transparent;cursor:pointer}
.drawer-item:hover{background:rgba(255,255,255,.04);color:#e2e8f0}
.drawer-item.active{background:rgba(0,245,212,.08);color:#00f5d4;border-left-color:#00f5d4}
.drawer-item .item-count{float:right;font-size:11px;color:#64748b;background:rgba(255,255,255,.05);padding:1px 6px;border-radius:3px}

/* ===== Main Content ===== */
.main-content{position:relative;z-index:1;padding-top:64px;max-width:1200px;margin:0 auto;padding-left:24px;padding-right:24px;padding-bottom:80px;min-height:100vh}

/* ===== Hero ===== */
.hero{text-align:center;padding:60px 20px 40px}
.hero h1{font-size:42px;font-weight:800;background:linear-gradient(135deg,#00f5d4,#7c3aed,#00f5d4);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradientShift 4s ease-in-out infinite;margin-bottom:12px}
@keyframes gradientShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.hero p{font-size:16px;color:#94a3b8;max-width:600px;margin:0 auto 8px}
.hero .hero-badge{display:inline-block;padding:4px 14px;border-radius:20px;background:rgba(0,245,212,.1);border:1px solid rgba(0,245,212,.2);font-size:12px;color:#00f5d4;margin-top:8px}

/* ===== Section Glass Card ===== */
.section-card{background:rgba(255,255,255,.05);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:32px;margin-bottom:32px;transition:all .3s ease}
.section-card:hover{box-shadow:0 8px 40px rgba(0,0,0,.3)}
.section-header{margin-bottom:24px}
.section-title{font-size:22px;font-weight:700;color:#e2e8f0;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.section-title .title-underline{flex:1;height:3px;background:linear-gradient(90deg,#00f5d4,#7c3aed,transparent);border-radius:2px}
.section-jump-links{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.jump-link{padding:4px 14px;border-radius:20px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:#94a3b8;font-size:12px;text-decoration:none;transition:all .2s;cursor:pointer}
.jump-link:hover{background:rgba(0,245,212,.12);border-color:rgba(0,245,212,.3);color:#00f5d4;box-shadow:0 0 15px rgba(0,245,212,.1)}
.section-api-count{font-size:13px;color:#64748b;margin-left:auto}

/* ===== API Card ===== */
.api-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:24px;margin-bottom:16px;border-left:4px solid;border-left-color:#00f5d4;transition:all .3s ease;position:relative}
.api-card:hover{background:rgba(255,255,255,.06);border-left-color:#7c3aed;box-shadow:0 0 30px rgba(0,245,212,.05);transform:translateY(-2px)}
.api-card .api-title{font-size:16px;font-weight:600;color:#e2e8f0;margin-bottom:4px}
.api-card .api-signature{font-family:'Cascadia Code','Fira Code','Consolas',monospace;font-size:13px;color:#00f5d4;margin-bottom:6px;word-break:break-all;line-height:1.5}
.api-card .api-signature .apiname{color:#00f5d4;font-weight:600}
.api-card .api-desc{margin-bottom:12px;font-size:13px;color:#94a3b8}
.api-card .api-desc .desctile{display:block;font-size:14px;font-weight:600;color:#e2e8f0;margin-bottom:4px}
.api-card .api-details{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:768px){.api-card .api-details{grid-template-columns:1fr}}

/* ===== Params Table ===== */
.params-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:12px}
.params-table th{text-align:left;padding:6px 10px;background:rgba(255,255,255,.04);color:#64748b;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid rgba(255,255,255,.08)}
.params-table td{padding:6px 10px;border-bottom:1px solid rgba(255,255,255,.04);color:#94a3b8;vertical-align:top}
.params-table tr:hover td{background:rgba(255,255,255,.02)}
.params-table .param-name{color:#00f5d4;font-family:'Cascadia Code','Fira Code','Consolas',monospace;font-size:12px}
.params-table .param-type{color:#7c3aed;font-family:'Cascadia Code','Fira Code','Consolas',monospace;font-size:11px}
.params-table .param-desc{color:#94a3b8}

/* ===== Return Value ===== */
.return-value{display:inline-block;padding:4px 12px;border-radius:6px;background:rgba(0,245,212,.08);border:1px solid rgba(0,245,212,.15);font-size:12px;color:#00f5d4;margin-bottom:12px}
.return-value .return-label{color:#64748b;margin-right:6px}

/* ===== Code Block ===== */
.code-block-wrapper{position:relative;margin-bottom:12px;border-radius:8px;overflow:hidden;border:1px solid rgba(0,245,212,.15);background:#1a1a2e}
.code-block-wrapper .code-tabs{display:flex;background:rgba(0,0,0,.2);border-bottom:1px solid rgba(255,255,255,.06)}
.code-tab{padding:6px 14px;font-size:11px;color:#64748b;cursor:pointer;border:none;background:transparent;transition:all .2s;font-family:inherit}
.code-tab.active{color:#00f5d4;background:rgba(0,245,212,.08)}
.code-tab:hover:not(.active){color:#94a3b8}
.code-block-wrapper pre{background:#1a1a2e;padding:14px 16px;overflow-x:auto;margin:0;font-size:12px;line-height:1.6;font-family:'Cascadia Code','Fira Code','Consolas',monospace;color:#e2e8f0}
.code-block-wrapper pre .code-content{white-space:pre}
.copy-btn{position:absolute;top:32px;right:8px;padding:4px 10px;border-radius:4px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.06);color:#94a3b8;font-size:11px;cursor:pointer;opacity:0;transition:all .2s;font-family:inherit}
.code-block-wrapper:hover .copy-btn{opacity:1}
.copy-btn:hover{background:rgba(0,245,212,.15);border-color:rgba(0,245,212,.3);color:#00f5d4}
.copy-btn.copied{background:rgba(0,245,212,.2);border-color:#00f5d4;color:#00f5d4}

/* ===== Status Badge (in description) ===== */
.status-badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600}
.status-pending{background:rgba(234,179,8,.15);color:#eab308}
.status-done{background:rgba(0,245,212,.15);color:#00f5d4}

/* ===== Toast ===== */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);padding:10px 24px;border-radius:8px;background:rgba(0,245,212,.15);backdrop-filter:blur(10px);border:1px solid rgba(0,245,212,.25);color:#00f5d4;font-size:13px;z-index:9999;opacity:0;transition:all .3s ease;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===== Search Highlight ===== */
.search-highlight{background:rgba(0,245,212,.2);color:#00f5d4;border-radius:2px;padding:0 2px}
.search-empty{padding:40px;text-align:center;color:#64748b;font-size:15px}
.search-empty .empty-icon{font-size:48px;margin-bottom:12px;display:block}

/* ===== Footer ===== */
.footer{text-align:center;padding:40px 20px;color:#64748b;font-size:12px;border-top:1px solid rgba(255,255,255,.06);margin-top:40px}
.footer a{color:#00f5d4;text-decoration:none}

/* ===== Responsive ===== */
@media(max-width:768px){
  .hero h1{font-size:28px}
  .hero{padding:40px 16px 24px}
  .section-card{padding:20px}
  .api-card{padding:16px}
  .topbar{height:56px;padding:0 12px;gap:8px}
  .main-content{padding-top:56px;padding-left:12px;padding-right:12px;padding-bottom:60px}
  .topbar-logo h1{font-size:14px}
  .topbar-logo .version{display:none}
  .topbar-search{max-width:200px}
  .topbar-actions .stat-badge{display:none}
}

/* ===== Print ===== */
@media print{
  .topbar,.drawer,.drawer-overlay,.bg-orbs,.copy-btn,.toast{display:none!important}
  .main-content{padding-top:0}
  .api-card{border:1px solid #ddd;break-inside:avoid}
  .section-card{background:#fff;border:1px solid #ddd}
  body{background:#fff;color:#333}
  .api-card .api-signature{color:#0066cc}
}
</style>
</head>
<body>
<div class="bg-orbs"><div class="orb"></div><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>

<!-- Top Bar -->
<header class="topbar">
  <button class="hamburger" id="menuBtn" title="打开导航">☰</button>
  <div class="topbar-logo">
    <div class="logo-icon">WB</div>
    <h1>WebView Bridge API</h1>
    <span class="version">v4.0</span>
  </div>
  <div class="topbar-search">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="搜索 API..." autocomplete="off">
  </div>
  <div class="topbar-actions">
    <span class="stat-badge" id="totalApis">0 个 API</span>
  </div>
</header>

<!-- Drawer Overlay -->
<div class="drawer-overlay" id="drawerOverlay"></div>

<!-- Navigation Drawer -->
<nav class="drawer" id="drawer">
  <div class="drawer-header">
    <h2>API 导航</h2>
    <button class="drawer-close" id="drawerClose">✕</button>
  </div>
  <div class="drawer-search">
    <input type="text" id="drawerSearch" placeholder="过滤导航..." autocomplete="off">
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</nav>

<!-- Main Content -->
<main class="main-content" id="mainContent">
  <section class="hero">
    <h1>WebView Bridge API</h1>
    <p>完整的 WebView Bridge 接口文档 — 涵盖所有控件的运行时 API 调用方式与命令分发说明</p>
    <span class="hero-badge" id="heroBadge">加载中...</span>
  </section>
  <div id="contentArea"></div>
  <footer class="footer">
    WebView Bridge API 文档 v4.0 &mdash; 基于 WebView2 &mdash; 支持易语言、JavaScript 调用
  </footer>
</main>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
(function(){
'use strict';

var DATA = window.API_DATA;
if (!DATA) return;

var docs = DATA.docs || {};
var displayName = DATA.displayName || {};
var sectionOrder = DATA.sectionOrder || [];
var nav = DATA.nav || [];
var contentArea = document.getElementById('contentArea');
var drawerBody = document.getElementById('drawerBody');

/* ── Helpers ── */
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function escAttribute(s){return String(s).replace(/"/g,'&quot;').replace(/&/g,'&amp;')}

/* ── Count APIs ── */
var totalApiCount = 0;
sectionOrder.forEach(function(key){
  if (docs[key]) totalApiCount += docs[key].length;
});
document.getElementById('totalApis').textContent = totalApiCount + ' 个 API';
document.getElementById('heroBadge').textContent = '共 ' + totalApiCount + ' 个导出 API 接口';

var sectionCounts = {};
sectionOrder.forEach(function(k){ sectionCounts[k] = docs[k] ? docs[k].length : 0; });

/* ── Build Drawer Navigation ── */
function buildDrawer(){
  var html = '';
  nav.forEach(function(group){
    html += '<div class="drawer-section">';
    html += '<div class="drawer-section-title">' + escHtml(group.title) + '</div>';
    group.keys.forEach(function(key){
      var cnt = sectionCounts[key] || 0;
      var dn = displayName[key] || key;
      html += '<a class="drawer-item" data-section="' + escAttribute(key) + '" href="#section-' + escAttribute(key) + '">'
        + escHtml(dn) + ' <span class="item-count">' + cnt + '</span></a>';
    });
    html += '</div>';
  });
  drawerBody.innerHTML = html;

  /* Click handler */
  drawerBody.addEventListener('click', function(e){
    var item = e.target.closest('.drawer-item');
    if (!item) return;
    closeDrawer();
  });
}

buildDrawer();

/* ── Drawer Controls ── */
var drawer = document.getElementById('drawer');
var overlay = document.getElementById('drawerOverlay');
var menuBtn = document.getElementById('menuBtn');
var drawerClose = document.getElementById('drawerClose');

function openDrawer(){ drawer.classList.add('active'); overlay.classList.add('active'); document.body.style.overflow='hidden'; }
function closeDrawer(){ drawer.classList.remove('active'); overlay.classList.remove('active'); document.body.style.overflow=''; }
menuBtn.addEventListener('click', openDrawer);
drawerClose.addEventListener('click', closeDrawer);
overlay.addEventListener('click', closeDrawer);

/* ── Build Content ── */
function buildContent(filterText){
  var f = filterText ? filterText.trim().toLowerCase() : '';
  var html = '';

  sectionOrder.forEach(function(sectionKey){
    var items = docs[sectionKey];
    if (!items || !items.length) return;

    var sectionHtml = '';
    var hasMatch = false;

    items.forEach(function(api, idx){
      var apiId = 'api-' + sectionKey + '-' + idx;
      var sig = api.sig || '';
      var desc = api.desc || '';
      var params = api.params || [];
      var ret = api.ret || '';
      var exApi = api.exApi || '';
      var exCmd = api.exCmd || '';

      /* Filter */
      if (f) {
        var searchText = (sig + desc + ret + exApi + exCmd).toLowerCase();
        if (searchText.indexOf(f) === -1) return;
      }

      hasMatch = true;
      var sigClean = sig.replace(/<[^>]+>/g, '').replace(/ApiName:\s*/g, '');

      sectionHtml += '<div class="api-card" id="' + escAttribute(apiId) + '">';
      sectionHtml += '<div class="api-title">' + escHtml(sigClean.substring(0, 80)) + '</div>';
      sectionHtml += '<div class="api-signature">' + sig + '</div>';

      sectionHtml += '<div class="api-desc">' + desc + '</div>';

      /* Params */
      if (params.length) {
        sectionHtml += '<table class="params-table"><thead><tr><th>参数</th><th>类型</th><th>说明</th></tr></thead><tbody>';
        params.forEach(function(p){
          var tn = p.t || '';
          var showType = tn;
          sectionHtml += '<tr><td class="param-name">' + escHtml(p.n) + '</td>'
            + '<td class="param-type">' + escHtml(showType) + '</td>'
            + '<td class="param-desc">' + escHtml(p.d) + '</td></tr>';
        });
        sectionHtml += '</tbody></table>';
      }

      /* Return */
      if (ret) {
        sectionHtml += '<div class="return-value"><span class="return-label">返回:</span> ' + escHtml(ret) + '</div>';
      }

      /* Code blocks */
      if (exApi || exCmd) {
        var hasApi = !!exApi;
        var hasCmd = !!exCmd;
        sectionHtml += '<div class="code-block-wrapper">';

        if (hasApi && hasCmd) {
          sectionHtml += '<div class="code-tabs">';
          sectionHtml += '<button class="code-tab active" data-tab="api-' + escAttribute(apiId) + '-api">JavaScript</button>';
          sectionHtml += '<button class="code-tab" data-tab="api-' + escAttribute(apiId) + '-cmd">命令格式</button>';
          sectionHtml += '</div>';
        }

        if (hasApi) {
          sectionHtml += '<pre id="api-' + escAttribute(apiId) + '-api"' + (hasCmd ? '' : '') + '>'
            + '<div class="code-content">' + escHtml(exApi) + '</div></pre>';
        }
        if (hasCmd) {
          sectionHtml += '<pre id="api-' + escAttribute(apiId) + '-cmd" style="' + (hasCmd && hasApi ? 'display:none' : '') + '">'
            + '<div class="code-content">' + escHtml(exCmd) + '</div></pre>';
        }

        sectionHtml += '<button class="copy-btn" data-copy="' + escAttribute(exApi || exCmd) + '">复制</button>';
        sectionHtml += '</div>';
      }

      sectionHtml += '</div>';
    });

    if (f && !hasMatch) return;

    var dn = displayName[sectionKey] || sectionKey;
    var cnt = sectionCounts[sectionKey] || 0;

    /* Jump links */
    var jumpHtml = '';
    items.forEach(function(api, idx){
      if (f) {
        var st = (api.sig + api.desc + (api.ret||'') + (api.exApi||'') + (api.exCmd||'')).toLowerCase();
        if (st.indexOf(f) === -1) return;
      }
      var sigClean = api.sig.replace(/<[^>]+>/g, '').replace(/ApiName:\s*/g, '');
      var shortName = sigClean.substring(0, 50);
      jumpHtml += '<a class="jump-link" href="#api-' + escAttribute(sectionKey) + '-' + idx + '">' + escHtml(shortName) + '</a>';
    });

    html += '<section class="section-card" id="section-' + escAttribute(sectionKey) + '">';
    html += '<div class="section-header">';
    html += '<div class="section-title">' + escHtml(dn)
      + '<span class="section-api-count">' + cnt + ' 个 API</span>'
      + '<div class="title-underline"></div></div>';
    if (jumpHtml) {
      html += '<div class="section-jump-links">' + jumpHtml + '</div>';
    }
    html += '</div>';
    html += sectionHtml;
    html += '</section>';
  });

  if (!html) {
    html = '<div class="search-empty"><span class="empty-icon">🔍</span>未找到匹配 "' + escHtml(f) + '" 的 API</div>';
  }

  contentArea.innerHTML = html;

  /* Re-bind code tabs */
  document.querySelectorAll('.code-tab').forEach(function(tab){
    tab.addEventListener('click', function(){
      var targetId = this.getAttribute('data-tab');
      var wrapper = this.closest('.code-block-wrapper');
      wrapper.querySelectorAll('.code-tab').forEach(function(t){ t.classList.remove('active'); });
      this.classList.add('active');
      wrapper.querySelectorAll('pre').forEach(function(p){ p.style.display = 'none'; });
      var target = document.getElementById(targetId);
      if (target) target.style.display = '';
    });
  });

  /* Re-bind copy buttons */
  document.querySelectorAll('.copy-btn').forEach(function(btn){
    btn.addEventListener('click', function(){
      var text = this.getAttribute('data-copy');
      if (!text) return;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function(){
          showToast('已复制到剪贴板');
        }).catch(function(){
          fallbackCopy(text);
        });
      } else {
        fallbackCopy(text);
      }
      this.classList.add('copied');
      var self = this;
      setTimeout(function(){ self.classList.remove('copied'); }, 1500);
    });
  });

  /* Highlight active nav item */
  drawerBody.querySelectorAll('.drawer-item').forEach(function(item){
    item.classList.remove('active');
  });
  if (!f) {
    /* Highlight based on hash or first visible section */
    var hash = window.location.hash;
    if (hash) {
      var activeItem = drawerBody.querySelector('.drawer-item[href="' + hash + '"]');
      if (activeItem) activeItem.classList.add('active');
    }
  }
}

/* Copy fallback */
function fallbackCopy(text){
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); showToast('已复制到剪贴板'); } catch(e) { showToast('复制失败'); }
  document.body.removeChild(ta);
}

/* Toast */
var toastTimer;
function showToast(msg){
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ el.classList.remove('show'); }, 2000);
}

/* ── Search ── */
var searchTimer;
var searchInput = document.getElementById('searchInput');
searchInput.addEventListener('input', function(){
  clearTimeout(searchTimer);
  var val = this.value;
  searchTimer = setTimeout(function(){ buildContent(val); }, 300);
});

/* Drawer search filter */
document.getElementById('drawerSearch').addEventListener('input', function(){
  var f = this.value.trim().toLowerCase();
  drawerBody.querySelectorAll('.drawer-item').forEach(function(item){
    var text = item.textContent.toLowerCase();
    item.style.display = (!f || text.indexOf(f) !== -1) ? '' : 'none';
  });
});

/* ── Hash Change ── */
window.addEventListener('hashchange', function(){
  var hash = window.location.hash;
  if (!hash) return;
  var el = document.querySelector(hash);
  if (el) {
    setTimeout(function(){ el.scrollIntoView({behavior:'smooth', block:'start'}); }, 100);
  }
  drawerBody.querySelectorAll('.drawer-item').forEach(function(item){
    item.classList.remove('active');
    if (item.getAttribute('href') === hash) item.classList.add('active');
  });
});

/* ── Scroll spy ── */
var scrollTimer2;
window.addEventListener('scroll', function(){
  clearTimeout(scrollTimer2);
  scrollTimer2 = setTimeout(function(){
    var sections = drawerBody.querySelectorAll('.drawer-item');
    var current = '';
    sections.forEach(function(item){
      var href = item.getAttribute('href');
      if (!href) return;
      var el = document.querySelector(href);
      if (el) {
        var rect = el.getBoundingClientRect();
        if (rect.top <= 120) current = href;
      }
    });
    if (current) {
      drawerBody.querySelectorAll('.drawer-item').forEach(function(item){
        item.classList.remove('active');
        if (item.getAttribute('href') === current) item.classList.add('active');
      });
    }
  }, 100);
}, {passive:true});

/* ── Keyboard shortcuts ── */
document.addEventListener('keydown', function(e){
  if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement !== searchInput) {
    e.preventDefault();
    searchInput.focus();
  }
  if (e.key === 'Escape') {
    closeDrawer();
    searchInput.blur();
  }
});

/* ── Initial render ── */
buildContent();

/* Hash at load */
if (window.location.hash) {
  setTimeout(function(){
    var el = document.querySelector(window.location.hash);
    if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
  }, 200);
}

})();
</script>
</body>
</html>
