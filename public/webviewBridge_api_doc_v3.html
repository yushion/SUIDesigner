<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebView Bridge API 文档</title>
<script src="webviewBridge_api_data.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#fff;color:#0f172a;line-height:1.6;display:flex;min-height:100vh}

/* ===== Layout ===== */
.sidebar{position:fixed;top:0;left:0;width:260px;height:100vh;background:#f8fafc;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;z-index:100}
.sidebar-header{padding:20px 16px 12px;background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff;flex-shrink:0}
.sidebar-header h1{font-size:18px;font-weight:700;letter-spacing:-.3px}
.sidebar-header p{font-size:12px;opacity:.6;margin-top:2px}
.sidebar-search{padding:10px 12px;flex-shrink:0;background:#f8fafc;border-bottom:1px solid #e2e8f0}
.sidebar-search input{width:100%;padding:7px 10px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;background:#fff;outline:none;transition:border-color .2s}
.sidebar-search input:focus{border-color:#3b82f6;box-shadow:0 0 0 2px rgba(59,130,246,.15)}
.sidebar-nav{flex:1;overflow-y:auto;padding:6px 0}
.sidebar-nav::-webkit-scrollbar{width:4px}
.sidebar-nav::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px}
.nav-item{display:flex;align-items:center;padding:7px 14px;margin:1px 8px;border-radius:6px;cursor:pointer;color:#334155;font-size:13px;transition:all .15s;border-left:3px solid transparent;text-decoration:none}
.nav-item:hover{background:#e2e8f0;color:#0f172a}
.nav-item.active{background:rgba(59,130,246,.08);color:#3b82f6;border-left-color:#3b82f6;font-weight:600}
.nav-item .nav-icon{width:22px;text-align:center;font-size:15px;flex-shrink:0;margin-right:8px}
.nav-item .nav-label{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-item .nav-badge{background:#e2e8f0;color:#64748b;font-size:10px;padding:1px 7px;border-radius:8px;font-weight:600;margin-left:6px;flex-shrink:0}
.nav-item.active .nav-badge{background:rgba(59,130,246,.15);color:#3b82f6}
.nav-item.hidden{display:none}

/* ===== Main Content ===== */
.main-content{margin-left:260px;flex:1;min-width:0}
.hero{background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);color:#fff;padding:48px 48px 36px}
.hero h1{font-size:30px;font-weight:700;margin-bottom:6px}
.hero p{font-size:14px;opacity:.7;max-width:700px;line-height:1.7}
.hero .stats{display:flex;gap:16px;margin-top:14px;flex-wrap:wrap}
.hero .stat-item{background:rgba(255,255,255,.08);border-radius:8px;padding:10px 20px;text-align:center;min-width:90px}
.hero .stat-item .num{font-size:22px;font-weight:700;display:block;color:#60a5fa}
.hero .stat-item .lbl{font-size:11px;opacity:.6;letter-spacing:.3px}

.content{padding:32px 48px 80px;max-width:1200px}
.section{display:none;animation:fadeIn .3s ease}
.section.visible{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.section-header{display:flex;align-items:center;margin-bottom:20px;padding:0 0 12px 14px;border-left:4px solid #3b82f6}
.section-header h2{font-size:22px;font-weight:700;color:#0f172a}
.section-header .section-count{margin-left:10px;font-size:12px;color:#94a3b8;background:#f1f5f9;padding:2px 10px;border-radius:10px}

/* ===== API Card ===== */
.api-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:box-shadow .2s;overflow:hidden;display:flex;flex-direction:column}
.api-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08)}
.api-card-inner{display:flex;min-height:0}
.api-card-main{flex:7;padding:18px 22px 18px;border-right:1px solid #f1f5f9}
.api-card-side{flex:3;padding:18px 20px;background:#fafbfc;min-width:180px}

.api-card-title{font-size:16px;font-weight:600;color:#0f172a;margin-bottom:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.api-card-title .desctile{font-weight:700}
.api-card-signature{font-size:13px;color:#475569;font-family:'Cascadia Code','Fira Code','Consolas',monospace;background:#f1f5f9;padding:8px 12px;border-radius:6px;border:1px solid #e2e8f0;word-break:break-all;line-height:1.5;margin-bottom:10px}
.api-card-signature .apiname{color:#1e293b;font-weight:600}
.api-card-desc{font-size:13px;color:#475569;margin-bottom:12px;line-height:1.7}
.api-card-desc .status-badge{display:inline-block;font-size:11px;padding:1px 8px;border-radius:4px;margin-left:4px;background:#fef3c7;color:#92400e}

/* Params Table */
.api-params{margin-bottom:10px}
.api-params .param-label{font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.api-params table{width:100%;border-collapse:collapse;font-size:12px}
.api-params td{padding:5px 8px;border-bottom:1px solid #f1f5f9;vertical-align:top}
.api-params td:first-child{font-family:'Cascadia Code','Fira Code','Consolas',monospace;color:#3b82f6;font-weight:600;white-space:nowrap;width:1%}
.api-params td:nth-child(2){color:#64748b;width:1%;white-space:nowrap}
.api-params td:last-child{color:#475569}
.api-params tr:last-child td{border-bottom:none}

/* Side Metadata */
.api-side-label{font-size:10px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.api-ret{background:#f1f5f9;border-radius:4px;padding:6px 10px;font-size:12px;font-family:'Cascadia Code','Fira Code','Consolas',monospace;color:#475569;word-break:break-all;line-height:1.4;margin-bottom:12px}

/* Code Samples */
.api-code{margin-top:10px}
.api-code-tabs{display:flex;gap:0;margin-bottom:0}
.api-code-tab{padding:5px 14px;font-size:12px;cursor:pointer;border:1px solid #e2e8f0;border-bottom:none;background:#f8fafc;color:#64748b;border-radius:6px 6px 0 0;font-weight:500;transition:all .15s}
.api-code-tab.active{background:#1e293b;color:#fff;border-color:#1e293b}
.api-code-content{display:none;background:#1e293b;color:#e2e8f0;border-radius:0 0 6px 6px;padding:12px 14px;font-size:12px;font-family:'Cascadia Code','Fira Code','Consolas',monospace;line-height:1.6;overflow-x:auto;position:relative;white-space:pre;border:1px solid #1e293b}
.api-code-content.active{display:block}
.api-code-content .copy-btn{position:absolute;top:6px;right:8px;background:rgba(255,255,255,.1);border:none;color:#94a3b8;cursor:pointer;font-size:11px;padding:2px 8px;border-radius:4px;transition:all .15s}
.api-code-content .copy-btn:hover{background:rgba(255,255,255,.2);color:#fff}

/* ===== Icon Map ===== */
.iconmap-section{margin-top:24px}
.iconmap-section .search-bar{margin-bottom:16px}
.iconmap-section .search-bar input{width:100%;max-width:400px;padding:8px 12px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;outline:none}
.iconmap-section .search-bar input:focus{border-color:#3b82f6;box-shadow:0 0 0 2px rgba(59,130,246,.15)}
.iconmap-table{width:100%;border-collapse:collapse;font-size:13px;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden}
.iconmap-table th{background:#f8fafc;padding:10px 14px;text-align:left;font-weight:600;color:#475569;font-size:12px;border-bottom:1px solid #e2e8f0;text-transform:uppercase;letter-spacing:.3px}
.iconmap-table td{padding:8px 14px;border-bottom:1px solid #f1f5f9;color:#334155}
.iconmap-table tr:last-child td{border-bottom:none}
.iconmap-table tr:hover{background:#f8fafc}
.iconmap-table .iconmap-emoji{font-size:20px;text-align:center;width:50px}
.iconmap-table .iconmap-key{font-family:'Cascadia Code','Fira Code','Consolas',monospace;color:#3b82f6;font-weight:600}

/* ===== Commands Table ===== */
.commands-table{width:100%;border-collapse:collapse;font-size:13px;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden}
.commands-table th{background:#f8fafc;padding:10px 14px;text-align:left;font-weight:600;color:#475569;font-size:12px;border-bottom:1px solid #e2e8f0;text-transform:uppercase;letter-spacing:.3px}
.commands-table td{padding:8px 14px;border-bottom:1px solid #f1f5f9;color:#334155;vertical-align:top}
.commands-table tr:last-child td{border-bottom:none}
.commands-table tr:hover{background:#f8fafc}
.commands-table .cmd-name{font-family:'Cascadia Code','Fira Code','Consolas',monospace;color:#3b82f6;font-weight:600;white-space:nowrap}
.commands-table .cmd-maps{font-size:12px;color:#64748b}
.commands-table .cmd-ex{font-size:12px;font-family:'Cascadia Code','Fira Code','Consolas',monospace;color:#64748b;word-break:break-all}

/* ===== Back to Top ===== */
.back-to-top{position:fixed;bottom:28px;right:28px;width:40px;height:40px;border-radius:50%;background:#1e293b;color:#fff;border:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.2);opacity:0;visibility:hidden;transition:all .3s;z-index:200}
.back-to-top.visible{opacity:1;visibility:visible}
.back-to-top:hover{background:#0f172a;transform:translateY(-2px)}

/* ===== Welcome Section ===== */
#section-welcome.visible{display:block}
.welcome-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-top:16px}
.welcome-card{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:14px 16px;cursor:pointer;transition:all .15s;text-decoration:none;color:inherit;display:block}
.welcome-card:hover{background:#fff;border-color:#3b82f6;box-shadow:0 2px 8px rgba(59,130,246,.1);transform:translateY(-1px)}
.welcome-card .wc-icon{font-size:22px;margin-bottom:4px}
.welcome-card .wc-name{font-size:13px;font-weight:600;color:#0f172a}
.welcome-card .wc-count{font-size:11px;color:#94a3b8;margin-top:2px}

/* ===== Responsive ===== */
.menu-toggle{display:none;position:fixed;top:12px;left:12px;z-index:200;background:#1e293b;color:#fff;border:none;padding:8px 12px;border-radius:6px;cursor:pointer;font-size:18px}
@media(max-width:900px){
  .sidebar{transform:translateX(-100%);transition:transform .3s}
  .sidebar.open{transform:translateX(0);box-shadow:4px 0 20px rgba(0,0,0,.15)}
  .main-content{margin-left:0}
  .menu-toggle{display:block}
  .hero{padding:48px 20px 28px}
  .content{padding:20px 16px 60px}
  .api-card-inner{flex-direction:column}
  .api-card-main{border-right:none;border-bottom:1px solid #f1f5f9}
}

/* Backdrop */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:99}
.sidebar-overlay.show{display:block}
@media(max-width:900px){
  .sidebar-overlay.show{display:block}
}
</style>
</head>
<body>

<button class="menu-toggle" id="menuToggle" aria-label="Toggle sidebar">☰</button>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- ===== Sidebar ===== -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1>WebView Bridge</h1>
    <p>API 参考文档 v3</p>
  </div>
  <div class="sidebar-search">
    <input type="text" id="searchInput" placeholder="搜索 API..." autocomplete="off">
  </div>
  <nav class="sidebar-nav" id="sidebarNav"></nav>
</aside>

<!-- ===== Main ===== -->
<div class="main-content" id="mainContent">

  <!-- Hero -->
  <div class="hero">
    <h1>WebView Bridge API</h1>
    <p>WebView2 前端桥接层 API 文档 — 提供控件操作、画布控制、消息通信等完整接口，支持 JS 调用与命令分发两种模式。</p>
    <div class="stats" id="statsContainer"></div>
  </div>

  <!-- Content -->
  <div class="content" id="contentContainer"></div>

  <!-- Back to Top -->
  <button class="back-to-top" id="backToTop" title="回到顶部">↑</button>
</div>

<script>
(function(){
  'use strict';

  var DATA = window.API_DATA;
  if (!DATA) {
    document.body.innerHTML = '<div style="padding:40px;text-align:center;font-size:18px;color:red">错误：未找到 API_DATA，请确保 webviewBridge_api_data.js 已正确加载。</div>';
    return;
  }

  // ===== Section Icons =====
  var SECTION_ICONS = {
    'public':'⌨','canvas':'🎨','icon-helpers':'🔤','messages':'📨',
    'button':'🔘','input':'⌨️','textarea':'📝','checkbox':'✅','toggle-ctrl':'🔄','combobox':'📋','label':'🏷️','hyperlink':'🔗','radiogroup':'🔘',
    'progressbar':'📊','datetimepicker':'📅','iconbutton':'🖼️','imagebox':'🖼️','logbox':'📋',
    'listBox':'📋','treeview':'🌳','datagrid':'📊','cardbox':'🗂️','tabcontainer':'📑','contextmenu':'📌','tooltip':'💬','messageBox':'💬','inputBox':'⌨️',
    'iconmap':'🗺️','commands':'⚡'
  };

  // ===== Compute Stats =====
  var totalAPIs = 0;
  var sectionCounts = {};
  DATA.sectionOrder.forEach(function(key){
    if (key === 'iconmap' || key === 'commands') return;
    var arr = DATA.docs[key];
    if (arr) { sectionCounts[key] = arr.length; totalAPIs += arr.length; }
  });

  var totalIconMap = DATA.iconMap ? DATA.iconMap.length : 0;
  var totalCommands = DATA.commands ? DATA.commands.length : 0;

  // ===== Render Sidebar =====
  var sidebarNav = document.getElementById('sidebarNav');

  function renderSidebar(){
    var html = '<a class="nav-item active" data-key="welcome" href="#welcome"><span class="nav-icon">🏠</span><span class="nav-label">总览</span></a>';
    DATA.sectionOrder.forEach(function(key){
      if (key === 'iconmap' || key === 'commands') return;
      var name = DATA.displayName[key] || key;
      var count = sectionCounts[key] || 0;
      var icon = SECTION_ICONS[key] || '📄';
      html += '<a class="nav-item" data-key="' + key + '" href="#' + key + '"><span class="nav-icon">' + icon + '</span><span class="nav-label">' + name + '</span><span class="nav-badge">' + count + '</span></a>';
    });
    // iconmap & commands at bottom
    html += '<a class="nav-item" data-key="iconmap" href="#iconmap"><span class="nav-icon">🗺️</span><span class="nav-label">图标映射表</span><span class="nav-badge">' + totalIconMap + '</span></a>';
    html += '<a class="nav-item" data-key="commands" href="#commands"><span class="nav-icon">⚡</span><span class="nav-label">命令分发表</span><span class="nav-badge">' + totalCommands + '</span></a>';
    sidebarNav.innerHTML = html;
  }
  renderSidebar();

  // ===== Render Content =====
  var contentContainer = document.getElementById('contentContainer');
  var statsContainer = document.getElementById('statsContainer');

  function renderStats(){
    statsContainer.innerHTML =
      '<div class="stat-item"><span class="num">' + totalAPIs + '</span><span class="lbl">API 接口</span></div>' +
      '<div class="stat-item"><span class="num">' + DATA.sectionOrder.filter(function(k){return k!=='iconmap'&&k!=='commands';}).length + '</span><span class="lbl">功能模块</span></div>' +
      '<div class="stat-item"><span class="num">' + totalIconMap + '</span><span class="lbl">图标映射</span></div>' +
      '<div class="stat-item"><span class="num">' + totalCommands + '</span><span class="lbl">命令条目</span></div>';
  }
  renderStats();

  function renderContent(){
    var html = '';

    // Welcome section
    html += '<div class="section visible" id="section-welcome">';
    html += '<div class="section-header"><h2>总览</h2></div>';
    html += '<p style="color:#475569;font-size:14px;margin-bottom:16px;line-height:1.7">WebView Bridge 提供了 <strong>' + totalAPIs + '</strong> 个 API 接口，覆盖 <strong>' + (DATA.sectionOrder.length-2) + '</strong> 个功能模块，包含 <strong>' + totalIconMap + '</strong> 个图标映射和 <strong>' + totalCommands + '</strong> 个命令分发入口。点击下方模块或左侧导航浏览详细文档。</p>';
    html += '<div class="welcome-cards">';

    // Category nav cards
    if (DATA.nav) {
      DATA.nav.forEach(function(group){
        html += '<div style="margin-bottom:6px"><strong style="font-size:13px;color:#64748b">' + group.title + '</strong><div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">';
        group.keys.forEach(function(key){
          if (key === 'iconmap' || key === 'commands') return;
          var name = DATA.displayName[key] || key;
          var count = sectionCounts[key] || 0;
          var icon = SECTION_ICONS[key] || '📄';
          html += '<a class="welcome-card" href="#' + key + '" style="flex:1;min-width:140px">';
          html += '<div class="wc-icon">' + icon + '</div>';
          html += '<div class="wc-name">' + name + '</div>';
          html += '<div class="wc-count">' + count + ' 个 API</div>';
          html += '</a>';
        });
        html += '</div></div>';
      });
    }

    html += '</div></div>';

    // API Sections
    DATA.sectionOrder.forEach(function(key){
      if (key === 'iconmap' || key === 'commands') return;
      var items = DATA.docs[key];
      if (!items || !items.length) return;
      var name = DATA.displayName[key] || key;
      var icon = SECTION_ICONS[key] || '📄';

      html += '<div class="section" id="section-' + key + '">';
      html += '<div class="section-header"><h2>' + icon + ' ' + name + '</h2><span class="section-count">' + items.length + ' 个 API</span></div>';

      items.forEach(function(api, idx){
        html += renderAPICard(api, key + '-' + idx);
      });

      html += '</div>';
    });

    // Icon Map Section
    html += '<div class="section" id="section-iconmap">';
    html += '<div class="section-header"><h2>🗺️ 图标占位符映射表</h2><span class="section-count">' + totalIconMap + ' 条</span></div>';
    html += '<div class="iconmap-section">';
    html += '<div class="search-bar"><input type="text" id="iconmapSearch" placeholder="搜索图标名称..." autocomplete="off"></div>';
    html += '<table class="iconmap-table" id="iconmapTable"><thead><tr><th style="width:50px">图标</th><th>名称</th></tr></thead><tbody>';
    DATA.iconMap.forEach(function(row){
      html += '<tr><td class="iconmap-emoji">' + row[1] + '</td><td class="iconmap-key">' + row[0] + '</td></tr>';
    });
    html += '</tbody></table></div></div>';

    // Commands Section
    html += '<div class="section" id="section-commands">';
    html += '<div class="section-header"><h2>⚡ 命令分发处理</h2><span class="section-count">' + totalCommands + ' 条</span></div>';
    html += '<table class="commands-table"><thead><tr><th>命令名称</th><th>说明</th><th>参数映射</th><th>示例</th></tr></thead><tbody>';
    DATA.commands.forEach(function(cmd){
      html += '<tr><td class="cmd-name">' + cmd.cmd + '</td><td>' + cmd.desc + '</td><td class="cmd-maps">' + cmd.maps + '</td><td class="cmd-ex">' + cmd.ex + '</td></tr>';
    });
    html += '</tbody></table></div>';

    contentContainer.innerHTML = html;
  }

  function renderAPICard(api, uid){
    var sig = api.sig || '';
    var desc = api.desc || '';
    var params = api.params || [];
    var ret = api.ret || '';
    var exApi = api.exApi || '';
    var exCmd = api.exCmd || '';

    var html = '<div class="api-card">';
    html += '<div class="api-card-inner">';
    html += '<div class="api-card-main">';

    // Title from desc
    var titleMatch = desc.match(/<span class="desctile">([^<]+)<\/span>/);
    var titleText = titleMatch ? titleMatch[1] : ('API #' + (idx+1));
    var descClean = desc.replace(/<span class="desctile">[^<]+<\/span>/, '');

    html += '<div class="api-card-title"><span class="desctile">' + titleText + '</span></div>';

    // Signature
    if (sig) {
      html += '<div class="api-card-signature">' + sig + '</div>';
    }

    // Description
    if (descClean) {
      html += '<div class="api-card-desc">' + descClean + '</div>';
    }

    // Params Table
    if (params.length > 0) {
      html += '<div class="api-params"><div class="param-label">参数</div><table>';
      params.forEach(function(p){
        html += '<tr><td>' + p.n + '</td><td>' + p.t + '</td><td>' + p.d + '</td></tr>';
      });
      html += '</table></div>';
    }

    // Code Samples
    if (exApi || exCmd) {
      html += '<div class="api-code">';
      html += '<div class="api-code-tabs">';
      if (exApi) html += '<span class="api-code-tab active" data-tab="code-js-' + uid + '">JavaScript</span>';
      if (exCmd) html += '<span class="api-code-tab' + (!exApi ? ' active' : '') + '" data-tab="code-cmd-' + uid + '">Command</span>';
      html += '</div>';
      if (exApi) {
        html += '<div class="api-code-content active" id="code-js-' + uid + '"><button class="copy-btn" onclick="copyCode(this)">复制</button>' + escapeHtml(exApi) + '</div>';
      }
      if (exCmd) {
        html += '<div class="api-code-content' + (!exApi ? ' active' : '') + '" id="code-cmd-' + uid + '"><button class="copy-btn" onclick="copyCode(this)">复制</button>' + escapeHtml(exCmd) + '</div>';
      }
      html += '</div>';
    }

    html += '</div>'; // api-card-main

    // Side
    html += '<div class="api-card-side">';
    html += '<div class="api-side-label">返回值</div>';
    html += '<div class="api-ret">' + ret + '</div>';
    // Show param count
    if (params.length > 0) {
      html += '<div class="api-side-label">参数数量</div>';
      html += '<div class="api-ret" style="margin-bottom:0">' + params.length + '</div>';
    }
    html += '</div>'; // api-card-side

    html += '</div>'; // api-card-inner
    html += '</div>';
    return html;
  }

  function escapeHtml(str){
    if (!str) return '';
    return str
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  renderContent();

  // ===== Hash Routing =====
  function navigateTo(hash){
    var key = hash.replace('#','') || 'welcome';

    // Update sidebar
    var items = sidebarNav.querySelectorAll('.nav-item');
    items.forEach(function(item){
      item.classList.toggle('active', item.dataset.key === key);
    });

    // Update sections
    var sections = contentContainer.querySelectorAll('.section');
    sections.forEach(function(s){
      var id = s.id.replace('section-','');
      s.classList.toggle('visible', id === key);
    });

    // Scroll to top
    window.scrollTo({top:0,behavior:'smooth'});

    // Close mobile sidebar
    closeSidebar();
  }

  window.addEventListener('hashchange', function(){
    navigateTo(window.location.hash);
  });

  // Initial navigation
  if (window.location.hash) {
    navigateTo(window.location.hash);
  } else {
    navigateTo('welcome');
  }

  // ===== Search =====
  var searchInput = document.getElementById('searchInput');
  searchInput.addEventListener('input', function(){
    var q = this.value.trim().toLowerCase();
    var items = sidebarNav.querySelectorAll('.nav-item');
    items.forEach(function(item){
      var label = (item.querySelector('.nav-label')||{}).textContent || '';
      var key = item.dataset.key || '';
      if (!q || label.toLowerCase().indexOf(q) !== -1 || key.toLowerCase().indexOf(q) !== -1) {
        item.classList.remove('hidden');
      } else {
        item.classList.add('hidden');
      }
    });
  });

  // ===== Icon Map Search =====
  document.addEventListener('input', function(e){
    if (e.target && e.target.id === 'iconmapSearch') {
      var q = e.target.value.trim().toLowerCase();
      var rows = document.querySelectorAll('#iconmapTable tbody tr');
      rows.forEach(function(row){
        var key = row.querySelector('.iconmap-key');
        if (key) {
          row.style.display = (!q || key.textContent.toLowerCase().indexOf(q) !== -1) ? '' : 'none';
        }
      });
    }
  });

  // ===== Code Tabs =====
  document.addEventListener('click', function(e){
    var tab = e.target.closest('.api-code-tab');
    if (!tab) return;
    var container = tab.closest('.api-code');
    if (!container) return;
    var tabs = container.querySelectorAll('.api-code-tab');
    var contents = container.querySelectorAll('.api-code-content');
    tabs.forEach(function(t){t.classList.remove('active');});
    contents.forEach(function(c){c.classList.remove('active');});
    tab.classList.add('active');
    var target = document.getElementById(tab.dataset.tab);
    if (target) target.classList.add('active');
  });

  // ===== Back to Top =====
  var backToTop = document.getElementById('backToTop');
  window.addEventListener('scroll', function(){
    backToTop.classList.toggle('visible', window.scrollY > 300);
  });
  backToTop.addEventListener('click', function(){
    window.scrollTo({top:0,behavior:'smooth'});
  });

  // ===== Mobile Sidebar =====
  var menuToggle = document.getElementById('menuToggle');
  var sidebarOverlay = document.getElementById('sidebarOverlay');
  var sidebar = document.getElementById('sidebar');

  function openSidebar(){
    sidebar.classList.add('open');
    sidebarOverlay.classList.add('show');
  }
  function closeSidebar(){
    sidebar.classList.remove('open');
    sidebarOverlay.classList.remove('show');
  }

  menuToggle.addEventListener('click', openSidebar);
  sidebarOverlay.addEventListener('click', closeSidebar);

  // Close on nav click (mobile)
  sidebarNav.addEventListener('click', function(e){
    if (window.innerWidth <= 900) {
      closeSidebar();
    }
  });

  // ===== Copy Code =====
  window.copyCode = function(btn){
    var content = btn.parentElement;
    var text = content.textContent.replace('复制','').trim();
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function(){
        var orig = btn.textContent;
        btn.textContent = '已复制';
        setTimeout(function(){ btn.textContent = orig; }, 1500);
      }).catch(function(){
        fallbackCopy(text, btn);
      });
    } else {
      fallbackCopy(text, btn);
    }
  };

  function fallbackCopy(text, btn){
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try {
      document.execCommand('copy');
      var orig = btn.textContent;
      btn.textContent = '已复制';
      setTimeout(function(){ btn.textContent = orig; }, 1500);
    } catch(e) {}
    document.body.removeChild(ta);
  }

})();
</script>

</body>
</html>
