<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WB Bridge — API 文档</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-light.min.css">
<style>
/* ===== Reset & Base ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:#fafbfc;color:#2d3436;line-height:1.6}

/* ===== Nav ===== */
.navbar{position:fixed;top:0;left:0;right:0;z-index:100;background:#fff;border-bottom:1px solid #f0f0f0;height:56px;display:flex;align-items:center;padding:0 24px}
.navbar-inner{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:1100px;margin:0 auto}
.navbar-brand{font-size:15px;font-weight:600;color:#2d3436;letter-spacing:-.3px;white-space:nowrap}
.navbar-brand span{color:#e8a87c;margin-right:2px}
.navbar-right{display:flex;align-items:center;gap:8px;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch}
.navbar-right::-webkit-scrollbar{display:none}
.nav-pill{display:inline-block;padding:4px 12px;border-radius:14px;font-size:12px;color:#636e72;background:transparent;border:1px solid #f0f0f0;cursor:pointer;transition:all .2s;white-space:nowrap;text-decoration:none;line-height:1.5}
.nav-pill:hover{background:#f0f0f0;border-color:#ddd;color:#2d3436}
.nav-pill.active{background:#e8a87c;border-color:#e8a87c;color:#fff}
.nav-search{position:relative;flex-shrink:0}
.nav-search input{width:140px;padding:5px 10px 5px 28px;border:1px solid #f0f0f0;border-radius:14px;font-size:12px;background:#fafbfc;color:#2d3436;outline:none;transition:all .2s}
.nav-search input:focus{width:180px;border-color:#e8a87c;background:#fff}
.nav-search input::placeholder{color:#b2bec3}
.nav-search .search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:11px;color:#b2bec3;pointer-events:none}

/* ===== Hero ===== */
.hero{padding:88px 24px 48px;text-align:center}
.hero h1{font-size:28px;font-weight:300;color:#2d3436;margin-bottom:8px;letter-spacing:-.5px}
.hero p.subtitle{font-size:14px;color:#b2bec3;margin-bottom:24px}
.hero-stats{display:flex;justify-content:center;gap:40px;flex-wrap:wrap}
.hero-stat{text-align:center}
.hero-stat .num{font-size:24px;font-weight:300;color:#e8a87c;display:block}
.hero-stat .label{font-size:12px;color:#b2bec3}

/* ===== Layout ===== */
.container{max-width:1100px;margin:0 auto;padding:0 24px 80px}

/* ===== Section ===== */
.section{margin-bottom:56px}
.section-header{margin-bottom:24px}
.section-header h2{font-size:22px;font-weight:300;color:#2d3436;padding-bottom:8px;border-bottom:2px solid #e8a87c;display:inline-block}
.section-subtitle{font-size:13px;color:#b2bec3;margin-top:4px}

/* ===== API Card ===== */
.api-card{background:#fff;border:1px solid #f0f0f0;border-radius:8px;padding:24px;margin-bottom:16px;transition:box-shadow .2s}
.api-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.04)}
.api-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}
.api-card-title{font-size:16px;font-weight:500;color:#2d3436;line-height:1.4}
.api-card-signature{font-family:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;font-size:13px;color:#b2bec3;background:#fafbfc;padding:6px 10px;border-radius:4px;display:inline-block;word-break:break-all;margin-top:6px}
.api-card-desc{font-size:14px;color:#636e72;line-height:1.7;margin-bottom:16px}
.api-card-desc .desctile{display:inline-block;font-weight:600;color:#2d3436;margin-right:4px}
.status-badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:11px;font-weight:500;vertical-align:middle}
.status-pending{background:#fff3cd;color:#856404}

/* ===== Params Table ===== */
.params-table{width:100%;border-collapse:collapse;margin-bottom:16px;font-size:13px}
.params-table th{text-align:left;padding:8px 12px;background:#fafbfc;border-bottom:1px solid #f0f0f0;font-weight:500;color:#636e72;font-size:12px}
.params-table td{padding:8px 12px;border-bottom:1px solid #f0f0f0;color:#2d3436;vertical-align:top}
.params-table tr:last-child td{border-bottom:none}
.params-table .param-name{font-family:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;font-size:12px;color:#2d3436;font-weight:500}
.params-table .param-type{font-family:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;font-size:11px;color:#e8a87c;background:#fef6f0;padding:1px 6px;border-radius:3px;white-space:nowrap}
.params-table .param-desc{color:#636e72}

/* ===== Return ===== */
.api-return{display:inline-flex;align-items:center;gap:6px;margin-bottom:16px;font-size:13px}
.api-return .ret-label{color:#b2bec3;font-size:12px}
.api-return .ret-value{font-family:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;font-size:12px;color:#2d3436;background:#fafbfc;padding:3px 10px;border-radius:4px;border:1px solid #f0f0f0}

/* ===== Code Example ===== */
.api-example{margin-top:12px}
.example-tabs{display:flex;gap:0;margin-bottom:0;border-bottom:1px solid #f0f0f0}
.example-tab{padding:6px 14px;font-size:12px;cursor:pointer;border:1px solid transparent;border-bottom:none;border-radius:4px 4px 0 0;color:#b2bec3;background:transparent;transition:all .2s;position:relative;top:1px}
.example-tab:hover{color:#636e72}
.example-tab.active{color:#2d3436;border-color:#f0f0f0;background:#fff}
.example-panel{display:none;position:relative}
.example-panel.active{display:block}
.example-panel pre{border-radius:0 4px 4px 4px;margin:0;border:1px solid #f0f0f0;border-top:none}
.example-panel code{font-size:13px;line-height:1.6}
.copy-btn{position:absolute;top:8px;right:8px;padding:4px 10px;font-size:11px;border:1px solid #f0f0f0;border-radius:4px;background:#fff;color:#b2bec3;cursor:pointer;transition:all .2s;z-index:2;line-height:1.4}
.copy-btn:hover{background:#f0f0f0;color:#2d3436}
.copy-btn.copied{background:#d4edda;border-color:#c3e6cb;color:#155724}

/* ===== Icon Map Table ===== */
.iconmap-section .iconmap-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:4px}
.iconmap-section .iconmap-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:#fff;border:1px solid #f0f0f0;border-radius:4px;font-size:13px}
.iconmap-section .iconmap-item .emoji{font-size:18px;flex-shrink:0}
.iconmap-section .iconmap-item .code{font-family:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;font-size:11px;color:#b2bec3}

/* ===== Commands Table ===== */
.commands-section .cmd-table{width:100%;border-collapse:collapse;font-size:13px}
.commands-section .cmd-table th{text-align:left;padding:10px 12px;background:#fafbfc;border-bottom:1px solid #f0f0f0;font-weight:500;color:#636e72;font-size:12px}
.commands-section .cmd-table td{padding:10px 12px;border-bottom:1px solid #f0f0f0;color:#2d3436;vertical-align:top}
.commands-section .cmd-table tr:last-child td{border-bottom:none}
.commands-section .cmd-table .cmd-name{font-family:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;font-size:12px;color:#2d3436;font-weight:500;white-space:nowrap}
.commands-section .cmd-table .cmd-desc{color:#636e72}
.commands-section .cmd-table .cmd-maps{font-family:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;font-size:11px;color:#b2bec3}
.commands-section .cmd-table .cmd-ex{font-family:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;font-size:11px;color:#b2bec3;word-break:break-all}

/* ===== Back to Top ===== */
.back-to-top{position:fixed;bottom:24px;right:24px;width:36px;height:36px;border-radius:50%;background:#fff;border:1px solid #f0f0f0;color:#b2bec3;font-size:16px;cursor:pointer;display:none;align-items:center;justify-content:center;transition:all .2s;z-index:99;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.back-to-top:hover{background:#f0f0f0;color:#2d3436}
.back-to-top.visible{display:flex}

/* ===== Scrollbar ===== */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#e0e0e0;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#ccc}

/* ===== Responsive ===== */
@media(max-width:768px){
  .navbar{padding:0 16px}
  .navbar-right{gap:4px}
  .nav-search input{width:100px}
  .nav-search input:focus{width:140px}
  .hero h1{font-size:22px}
  .hero-stats{gap:20px}
  .container{padding:0 16px 60px}
  .api-card{padding:16px}
  .api-card-header{flex-direction:column}
  .iconmap-section .iconmap-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
}
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar" id="navbar">
  <div class="navbar-inner">
    <div class="navbar-brand"><span>◈</span> WB Bridge</div>
    <div class="navbar-right" id="navPills"></div>
    <div class="nav-search">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="搜索 API..." autocomplete="off">
    </div>
  </div>
</nav>

<!-- Hero -->
<section class="hero">
  <h1>WebView Bridge API</h1>
  <p class="subtitle">面向易语言开发者的 WebView2 桥接接口文档</p>
  <div class="hero-stats" id="heroStats"></div>
</section>

<!-- Content -->
<div class="container" id="content"></div>

<!-- Back to Top -->
<button class="back-to-top" id="backToTop" title="回到顶部">↑</button>

<script src="webviewBridge_api_data.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
(function(){
  var D = window.API_DATA;
  if(!D) return void console.error('API_DATA not found');

  // ===== Helpers =====
  function esc(str){return String(str).replace(/[&<>"']/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]})}

  function stripSigHTML(sig){
    // Extract text from <b class="apiname">...</b>
    var m = sig.match(/<b class="apiname">([^<]*)<\/b>/);
    return m ? m[1] : sig.replace(/<[^>]+>/g,'');
  }

  function stripDescHTML(desc){
    return desc.replace(/<[^>]+>/g,'');
  }

  function getSectionDisplayName(key){
    return D.displayName[key] || key;
  }

  // ===== Counters =====
  var totalAPIs = 0;
  var totalSections = 0;
  var sectionKeys = D.sectionOrder || Object.keys(D.docs);
  for(var k in D.docs){
    if(D.docs.hasOwnProperty(k)){
      totalAPIs += (D.docs[k] && D.docs[k].length) || 0;
      totalSections++;
    }
  }

  // ===== Hero Stats =====
  var statsHTML = '';
  statsHTML += '<div class="hero-stat"><span class="num">' + totalAPIs + '</span><span class="label">API 方法</span></div>';
  statsHTML += '<div class="hero-stat"><span class="num">' + totalSections + '</span><span class="label">分类</span></div>';
  statsHTML += '<div class="hero-stat"><span class="num">' + (D.iconMap ? D.iconMap.length : 0) + '</span><span class="label">图标</span></div>';
  statsHTML += '<div class="hero-stat"><span class="num">' + (D.commands ? D.commands.length : 0) + '</span><span class="label">命令</span></div>';
  document.getElementById('heroStats').innerHTML = statsHTML;

  // ===== Nav Pills =====
  function renderNav(){
    var nav = D.nav || [];
    var html = '';
    for(var i=0;i<nav.length;i++){
      var g = nav[i];
      html += '<a class="nav-pill" href="#section-' + g.keys[0] + '" data-nav="' + esc(g.title) + '">' + esc(g.title) + '</a>';
    }
    document.getElementById('navPills').innerHTML = html;
  }
  renderNav();

  // ===== Hash Navigation + Smooth Scroll =====
  function scrollToSection(id){
    var el = document.getElementById(id);
    if(el){
      var top = el.getBoundingClientRect().top + window.pageYOffset - 64;
      window.scrollTo({top:top,behavior:'smooth'});
    }
  }

  function onHashChange(){
    var hash = location.hash.slice(1);
    if(hash){
      scrollToSection(hash);
      // active nav pill
      var pills = document.querySelectorAll('.nav-pill');
      for(var i=0;i<pills.length;i++){
        pills[i].classList.toggle('active',pills[i].getAttribute('href') === '#' + hash);
      }
    }
  }
  window.addEventListener('hashchange',onHashChange);

  // ===== Search =====
  var searchInput = document.getElementById('searchInput');
  searchInput.addEventListener('input',function(){
    var q = this.value.trim().toLowerCase();
    var cards = document.querySelectorAll('.api-card');
    var sections = document.querySelectorAll('.section');
    if(!q){
      for(var i=0;i<cards.length;i++) cards[i].style.display = '';
      for(var i=0;i<sections.length;i++) sections[i].style.display = '';
      return;
    }
    for(var i=0;i<cards.length;i++){
      var card = cards[i];
      var text = card.textContent.toLowerCase();
      card.style.display = text.indexOf(q) > -1 ? '' : 'none';
    }
    for(var i=0;i<sections.length;i++){
      var sec = sections[i];
      var visible = sec.querySelector('.api-card[style*="display: none"]') === null;
      if(sec.querySelector('.api-card')){
        sec.style.display = sec.querySelectorAll('.api-card:not([style*="display: none"])').length > 0 ? '' : 'none';
      }
    }
  });

  // ===== Back to Top =====
  var backBtn = document.getElementById('backToTop');
  window.addEventListener('scroll',function(){
    backBtn.classList.toggle('visible',window.pageYOffset > 300);
  });
  backBtn.addEventListener('click',function(){
    window.scrollTo({top:0,behavior:'smooth'});
  });

  // ===== Render Content =====
  function render(){
    var content = document.getElementById('content');
    var html = '';

    for(var si=0;si<sectionKeys.length;si++){
      var key = sectionKeys[si];
      var methods = D.docs[key];
      if(!methods || !methods.length) continue;

      var displayName = getSectionDisplayName(key);
      var sectionId = 'section-' + key;

      html += '<section class="section" id="' + esc(sectionId) + '">';
      html += '<div class="section-header">';
      html += '<h2>' + esc(displayName) + '</h2>';
      html += '<div class="section-subtitle">共 ' + methods.length + ' 个方法</div>';
      html += '</div>';

      // API Cards
      for(var mi=0;mi<methods.length;mi++){
        var m = methods[mi];
        var sigText = stripSigHTML(m.sig);
        var descHTML = m.desc;

        html += '<div class="api-card">';
        html += '<div class="api-card-header">';
        html += '<div class="api-card-title">' + esc(stripDescHTML(m.desc).split('。')[0] || '') + '</div>';
        html += '</div>';
        html += '<div class="api-card-signature">' + esc(sigText) + '</div>';

        // Description
        html += '<div class="api-card-desc">' + descHTML + '</div>';

        // Params
        if(m.params && m.params.length > 0){
          html += '<table class="params-table">';
          html += '<thead><tr><th>参数</th><th>类型</th><th>说明</th></tr></thead>';
          html += '<tbody>';
          for(var pi=0;pi<m.params.length;pi++){
            var p = m.params[pi];
            html += '<tr>';
            html += '<td><span class="param-name">' + esc(p.n) + '</span></td>';
            html += '<td><span class="param-type">' + esc(p.t) + '</span></td>';
            html += '<td><span class="param-desc">' + esc(p.d) + '</span></td>';
            html += '</tr>';
          }
          html += '</tbody></table>';
        }

        // Return
        if(m.ret){
          html += '<div class="api-return">';
          html += '<span class="ret-label">返回值</span>';
          html += '<span class="ret-value">' + esc(m.ret) + '</span>';
          html += '</div>';
        }

        // Code Examples
        if(m.exApi || m.exCmd){
          html += '<div class="api-example">';
          html += '<div class="example-tabs">';
          var hasApi = !!m.exApi;
          var hasCmd = !!m.exCmd;
          if(hasApi) html += '<span class="example-tab active" data-tab="api-' + si + '-' + mi + '">JavaScript</span>';
          if(hasCmd) html += '<span class="example-tab' + (hasApi ? '' : ' active') + '" data-tab="cmd-' + si + '-' + mi + '">Command</span>';
          html += '</div>';
          if(hasApi){
            html += '<div class="example-panel active" id="panel-api-' + si + '-' + mi + '">';
            html += '<button class="copy-btn" data-copy="code-api-' + si + '-' + mi + '">复制</button>';
            html += '<pre><code class="language-javascript" id="code-api-' + si + '-' + mi + '">' + esc(m.exApi) + '</code></pre>';
            html += '</div>';
          }
          if(hasCmd){
            html += '<div class="example-panel' + (hasApi ? '' : ' active') + '" id="panel-cmd-' + si + '-' + mi + '">';
            html += '<button class="copy-btn" data-copy="code-cmd-' + si + '-' + mi + '">复制</button>';
            html += '<pre><code class="language-json" id="code-cmd-' + si + '-' + mi + '">' + esc(m.exCmd) + '</code></pre>';
            html += '</div>';
          }
          html += '</div>';
        }

        html += '</div>'; // .api-card
      }

      html += '</section>';
    }

    // ===== Icon Map Section =====
    if(D.iconMap && D.iconMap.length){
      html += '<section class="section iconmap-section" id="section-iconmap">';
      html += '<div class="section-header">';
      html += '<h2>' + esc(getSectionDisplayName('iconmap')) + '</h2>';
      html += '<div class="section-subtitle">共 ' + D.iconMap.length + ' 个图标占位符</div>';
      html += '</div>';
      html += '<div class="iconmap-grid">';
      for(var i=0;i<D.iconMap.length;i++){
        var item = D.iconMap[i];
        html += '<div class="iconmap-item">';
        html += '<span class="emoji">' + item[1] + '</span>';
        html += '<span class="code">[' + esc(item[0]) + ']</span>';
        html += '</div>';
      }
      html += '</div>';
      html += '</section>';
    }

    // ===== Commands Section =====
    if(D.commands && D.commands.length){
      html += '<section class="section commands-section" id="section-commands">';
      html += '<div class="section-header">';
      html += '<h2>' + esc(getSectionDisplayName('commands')) + '</h2>';
      html += '<div class="section-subtitle">共 ' + D.commands.length + ' 个命令</div>';
      html += '</div>';
      html += '<table class="cmd-table">';
      html += '<thead><tr><th>命令</th><th>说明</th><th>参数映射</th><th>示例</th></tr></thead>';
      html += '<tbody>';
      for(var i=0;i<D.commands.length;i++){
        var cmd = D.commands[i];
        html += '<tr>';
        html += '<td><span class="cmd-name">' + esc(cmd.cmd) + '</span></td>';
        html += '<td><span class="cmd-desc">' + esc(cmd.desc) + '</span></td>';
        html += '<td><span class="cmd-maps">' + esc(cmd.maps) + '</span></td>';
        html += '<td><span class="cmd-ex">' + esc(cmd.ex) + '</span></td>';
        html += '</tr>';
      }
      html += '</tbody></table>';
      html += '</section>';
    }

    content.innerHTML = html;

    // ===== Highlight.js =====
    if(typeof hljs !== 'undefined'){
      document.querySelectorAll('pre code').forEach(function(block){
        hljs.highlightElement(block);
      });
    }

    // ===== Tab Switcher =====
    document.querySelectorAll('.example-tab').forEach(function(tab){
      tab.addEventListener('click',function(){
        var parent = this.closest('.api-example');
        parent.querySelectorAll('.example-tab').forEach(function(t){t.classList.remove('active')});
        parent.querySelectorAll('.example-panel').forEach(function(p){p.classList.remove('active')});
        this.classList.add('active');
        var panel = document.getElementById('panel-' + this.getAttribute('data-tab'));
        if(panel) panel.classList.add('active');
      });
    });

    // ===== Copy Button =====
    document.querySelectorAll('.copy-btn').forEach(function(btn){
      btn.addEventListener('click',function(){
        var codeId = this.getAttribute('data-copy');
        var codeEl = document.getElementById(codeId);
        if(!codeEl) return;
        var text = codeEl.textContent;
        if(navigator.clipboard){
          navigator.clipboard.writeText(text).then(function(){
            btn.textContent = '已复制';
            btn.classList.add('copied');
            setTimeout(function(){
              btn.textContent = '复制';
              btn.classList.remove('copied');
            },1800);
          }).catch(function(){});
        } else {
          // Fallback
          var ta = document.createElement('textarea');
          ta.value = text;
          ta.style.position = 'fixed';
          ta.style.left = '-9999px';
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
          btn.textContent = '已复制';
          btn.classList.add('copied');
          setTimeout(function(){
            btn.textContent = '复制';
            btn.classList.remove('copied');
          },1800);
        }
      });
    });

    // ===== Handle initial hash =====
    onHashChange();
  }

  render();
})();
</script>
</body>
</html>
