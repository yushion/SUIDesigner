<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebView Bridge API 文档</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/vs2015.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/json.min.js"></script>
<script src="webviewBridge_api_data.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg-page);color:var(--text-primary);line-height:1.6;display:flex;min-height:100vh}

/* ===== Theme Variables ===== */
:root{
  --sidebar-bg:#1a1a2e; --sidebar-text:#c4c4d4; --sidebar-text-secondary:#8888a0;
  --sidebar-hover:rgba(255,255,255,.04); --sidebar-active-bg:rgba(74,108,247,.1);
  --sidebar-active-border:#4a6cf7; --sidebar-active-text:#4a6cf7;
  --accent:#4a6cf7; --accent-light:rgba(74,108,247,.15); --accent-hover:#3b5de7;
  --welcome-start:#1a1a2e; --welcome-end:#16213e;
  --bg-page:#f0f2f5; --card-bg:#fff; --card-border:#e8eaed;
  --text-primary:#1a1a2e; --text-secondary:#555; --text-muted:#888;
  --code-bg:#1e1e2e; --return-bg:#f0faf0; --return-text:#2e7d32; --return-border:#d4edda;
  --table-header-bg:#f6f8fa; --table-border:#e8eaed;
}

[data-theme="emerald"]{
  --sidebar-bg:#0d3320; --sidebar-active-bg:rgba(16,185,129,.12);
  --sidebar-active-border:#10b981; --sidebar-active-text:#10b981;
  --accent:#10b981; --accent-light:rgba(16,185,129,.15); --accent-hover:#059669;
  --welcome-start:#0d3320; --welcome-end:#064e3b;
}
[data-theme="amethyst"]{
  --sidebar-bg:#2d1b69; --sidebar-active-bg:rgba(139,92,246,.12);
  --sidebar-active-border:#8b5cf6; --sidebar-active-text:#8b5cf6;
  --accent:#8b5cf6; --accent-light:rgba(139,92,246,.15); --accent-hover:#7c3aed;
  --welcome-start:#2d1b69; --welcome-end:#4c1d95;
}
[data-theme="ocean"]{
  --sidebar-bg:#0c2233; --sidebar-active-bg:rgba(6,182,212,.12);
  --sidebar-active-border:#06b6d4; --sidebar-active-text:#06b6d4;
  --accent:#06b6d4; --accent-light:rgba(6,182,212,.15); --accent-hover:#0891b2;
  --welcome-start:#0c2233; --welcome-end:#0f4c5c;
}
[data-theme="rose"]{
  --sidebar-bg:#381525; --sidebar-active-bg:rgba(225,29,72,.12);
  --sidebar-active-border:#e11d48; --sidebar-active-text:#e11d48;
  --accent:#e11d48; --accent-light:rgba(225,29,72,.15); --accent-hover:#be123c;
  --welcome-start:#381525; --welcome-end:#701a35;
}
[data-theme="slate"]{
  --sidebar-bg:#1e293b; --sidebar-active-bg:rgba(100,116,139,.12);
  --sidebar-active-border:#64748b; --sidebar-active-text:#64748b;
  --accent:#64748b; --accent-light:rgba(100,116,139,.15); --accent-hover:#475569;
  --welcome-start:#1e293b; --welcome-end:#334155;
}
[data-theme="sunset"]{
  --sidebar-bg:#3d1f00; --sidebar-active-bg:rgba(249,115,22,.12);
  --sidebar-active-border:#f97316; --sidebar-active-text:#f97316;
  --accent:#f97316; --accent-light:rgba(249,115,22,.15); --accent-hover:#ea580c;
  --welcome-start:#3d1f00; --welcome-end:#7c2d12;
}
[data-theme="midnight"]{
  --sidebar-bg:#0f172a; --sidebar-active-bg:rgba(56,189,248,.12);
  --sidebar-active-border:#38bdf8; --sidebar-active-text:#38bdf8;
  --accent:#38bdf8; --accent-light:rgba(56,189,248,.15); --accent-hover:#0ea5e9;
  --welcome-start:#0f172a; --welcome-end:#1e3a5f;
}

/* ===== Sidebar ===== */
.sidebar{position:fixed;top:0;left:0;width:280px;height:100vh;background:var(--sidebar-bg);color:var(--sidebar-text);display:flex;flex-direction:column;z-index:100;overflow:hidden;transition:transform .3s ease}
.sidebar-brand{padding:24px 20px 16px;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0}
.sidebar-brand h1{font-size:18px;font-weight:700;color:#fff;letter-spacing:.5px}
.sidebar-brand p{font-size:12px;color:#8888a0;margin-top:2px}
.sidebar-search{padding:12px 16px;flex-shrink:0}
.sidebar-search input{width:100%;padding:8px 12px;border-radius:6px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.06);color:#e0e0f0;font-size:13px;outline:none;transition:all .2s}
.sidebar-search input::placeholder{color:#6666a0}
.sidebar-search input:focus{border-color:var(--accent);background:rgba(255,255,255,.1);box-shadow:0 0 0 3px var(--accent-light)}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 0 20px}
.sidebar-nav::-webkit-scrollbar{width:4px}
.sidebar-nav::-webkit-scrollbar-track{background:transparent}
.sidebar-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.nav-group{margin-bottom:4px}
.nav-group-title{display:flex;align-items:center;padding:8px 20px;font-size:12px;font-weight:600;color:#8888a0;text-transform:uppercase;letter-spacing:.8px;cursor:pointer;user-select:none;transition:color .2s}
.nav-group-title:hover{color:#b0b0c8}
.nav-group-title .arrow{display:inline-block;width:6px;height:6px;border-right:1.5px solid #8888a0;border-bottom:1.5px solid #8888a0;transform:rotate(45deg);margin-right:8px;transition:transform .25s ease;flex-shrink:0}
.nav-group-title.collapsed .arrow{transform:rotate(-45deg)}
.nav-group-items{list-style:none;overflow:hidden;transition:max-height .25s ease}
.nav-group-items.collapsed{max-height:0!important}
.nav-item a{display:block;padding:6px 20px 6px 36px;font-size:13px;color:#b0b0c8;text-decoration:none;transition:all .15s;border-left:2px solid transparent;position:relative}
.nav-item a:hover{color:#fff;background:rgba(255,255,255,.04)}
.nav-item a.active{color:var(--sidebar-active-text);background:var(--sidebar-active-bg);border-left-color:var(--sidebar-active-border)}
.nav-item a .count{float:right;background:rgba(255,255,255,.08);color:#8888a0;font-size:10px;padding:0 6px;border-radius:8px;line-height:16px;margin-top:2px}
.nav-item.hidden{display:none}
.sidebar-overlay{display:none}
/* ===== Main Content ===== */
.main-content{margin-left:280px;flex:1;min-width:0;padding:0}
/* Welcome Section */
.welcome{background:linear-gradient(135deg,var(--welcome-start) 0%,var(--welcome-end) 100%);color:#fff;padding:48px 48px 40px}
.welcome h1{font-size:32px;font-weight:700;margin-bottom:8px}
.welcome p{font-size:15px;opacity:.75;max-width:700px;line-height:1.7}
.welcome .stats{display:flex;gap:20px;margin-top:16px;flex-wrap:wrap}
.welcome .stat-item{background:rgba(255,255,255,.08);border-radius:8px;padding:10px 20px;text-align:center;min-width:100px}
.welcome .stat-item .num{font-size:24px;font-weight:700;display:block;color:var(--accent)}
.welcome .stat-item .lbl{font-size:11px;opacity:.6;text-transform:uppercase;letter-spacing:.5px}
/* Content Sections */
.content{padding:32px 48px 80px}
.section{margin-bottom:40px}
.section-header{display:flex;align-items:center;margin-bottom:20px;padding-bottom:12px;border-bottom:2px solid var(--card-border)}
.section-header h2{font-size:24px;font-weight:700;color:var(--text-primary)}
.section-header .section-count{margin-left:12px;font-size:12px;color:var(--text-muted);background:var(--bg-page);padding:2px 10px;border-radius:12px}
/* API Card */
.api-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;margin-bottom:24px;box-shadow:0 1px 3px rgba(0,0,0,.06);transition:box-shadow .2s,transform .2s;overflow:hidden}
.api-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);transform:translateY(-1px)}
.api-card-head{padding:20px 24px 12px;border-bottom:1px solid #f0f2f5}
.api-card-title{font-size:15px;font-weight:600;color:var(--text-primary);margin-bottom:8px}
.api-card-signature{font-size:14px;color:var(--return-text);font-family:'Cascadia Code','Fira Code','Consolas',monospace;background:var(--table-header-bg);padding:10px 14px;border-radius:8px;border:1px solid var(--card-border);word-break:break-all;line-height:1.5}
.api-card-signature .apiname{color:var(--return-text);font-weight:600}
.api-card-body{padding:16px 24px 20px}
.api-card-desc{font-size:14px;color:var(--text-secondary);margin-bottom:14px;line-height:1.7}
.api-card-desc .desctile{display:inline-block;font-weight:600;color:var(--text-primary);margin-bottom:6px;font-size:15px}
.api-card-desc .status-badge{display:inline-block;font-size:11px;padding:1px 8px;border-radius:4px;margin-left:4px;vertical-align:middle}
.api-card-desc .status-pending{background:#fff3cd;color:#856404}
/* Params Table */
.api-params{margin-bottom:14px}
.api-params .label{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.api-params table{width:100%;border-collapse:collapse;font-size:13px;border-radius:8px;overflow:hidden;border:1px solid var(--card-border)}
.api-params th{background:var(--table-header-bg);padding:8px 14px;text-align:left;font-weight:600;font-size:12px;color:var(--text-secondary);border-bottom:1px solid var(--card-border)}
.api-params th:not(:last-child){border-right:1px solid var(--card-border)}
.api-params td{padding:8px 14px;border-top:1px solid var(--bg-page);vertical-align:top;color:#444}
.api-params td:not(:last-child){border-right:1px solid var(--bg-page)}
.api-params tr:first-child td{border-top:none}
.api-params .param-type{color:var(--accent);font-family:'Cascadia Code','Fira Code',monospace;font-size:12px;white-space:nowrap}
.api-params .param-optional{color:#999;font-size:11px;margin-left:2px}
/* Return Value */
.api-returns{margin-bottom:14px}
.api-returns .label{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.api-returns .val{background:var(--return-bg);color:var(--return-text);padding:6px 12px;border-radius:6px;font-size:13px;font-family:'Cascadia Code','Fira Code',monospace;display:inline-block;border:1px solid var(--return-border)}
/* Code Examples */
.api-examples{margin-top:4px}
.api-examples .tabs{display:flex;gap:0;margin-bottom:0;border-bottom:1px solid #e0e0e0}
.api-examples .tab-btn{padding:6px 16px;font-size:12px;font-weight:600;color:var(--text-muted);background:none;border:none;cursor:pointer;transition:all .15s;position:relative;border-radius:4px 4px 0 0}
.api-examples .tab-btn:hover{color:var(--text-primary);background:#f5f5f5}
.api-examples .tab-btn.active{color:var(--accent);background:#fff;border:1px solid #e0e0e0;border-bottom-color:#fff;margin-bottom:-1px}
.api-examples .tab-content{display:none;position:relative}
.api-examples .tab-content.active{display:block}
.api-examples .copy-btn{position:absolute;top:8px;right:8px;padding:4px 10px;font-size:11px;background:rgba(255,255,255,.15);color:#ccc;border:1px solid rgba(255,255,255,.1);border-radius:4px;cursor:pointer;transition:all .15s;z-index:2;line-height:1.4}
.api-examples .copy-btn:hover{background:rgba(255,255,255,.25);color:#fff}
.api-examples .copy-btn.copied{background:#2e7d32;color:#fff;border-color:#2e7d32}
.api-examples pre{background:#1e1e2e;border-radius:0 0 8px 8px;margin:0;padding:14px 16px;overflow-x:auto;max-height:360px}
.api-examples pre code{font-size:13px;line-height:1.5;font-family:'Cascadia Code','Fira Code','Consolas',monospace}
/* Back to Top */
.back-to-top{position:fixed;bottom:32px;right:32px;width:42px;height:42px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:18px;cursor:pointer;box-shadow:0 4px 12px rgba(74,108,247,.35);opacity:0;visibility:hidden;transition:all .25s;z-index:200;display:flex;align-items:center;justify-content:center}
.back-to-top.visible{opacity:1;visibility:visible}
.back-to-top:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(74,108,247,.45)}
/* ===== Footer ===== */
.footer{text-align:center;padding:24px;font-size:13px;color:#999;border-top:1px solid #e8eaed;margin-top:20px}

/* ===== Icon Map Table ===== */
.icon-table{width:100%;border-collapse:collapse;font-size:13px}
.icon-table th{background:var(--table-header-bg);padding:8px 12px;text-align:left;font-weight:600;font-size:12px;color:var(--text-secondary);border-bottom:2px solid var(--card-border);position:sticky;top:0}
.icon-table td{padding:6px 12px;border-bottom:1px solid var(--bg-page);vertical-align:middle}
.icon-table tr:hover{background:var(--table-header-bg)}
.icon-table code{font-size:13px;font-family:'Cascadia Code','Fira Code','Consolas',monospace}
.icon-table .emoji-cell{font-size:18px;text-align:center}
.icon-table .alias-cell{font-size:12px;color:var(--text-muted)}
.icon-search{margin-bottom:12px}
.icon-search input{padding:8px 14px;border:1px solid var(--card-border);border-radius:8px;font-size:13px;width:260px;outline:none;transition:border .2s;background:var(--card-bg);color:var(--text-primary)}
.icon-search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light)}
.icon-count{font-size:12px;color:var(--text-muted);margin-bottom:8px}
/* ===== Commands Table ===== */
.cmd-table{width:100%;border-collapse:collapse;font-size:13px;border:1px solid var(--card-border);border-radius:8px;overflow:hidden}
.cmd-table th{background:var(--table-header-bg);padding:10px 14px;text-align:left;font-weight:600;font-size:12px;color:var(--text-secondary);border-bottom:2px solid var(--card-border)}
.cmd-table td{padding:10px 14px;border-bottom:1px solid var(--bg-page);vertical-align:top}
.cmd-table tr:last-child td{border-bottom:none}
.cmd-table tr:hover{background:var(--table-header-bg)}
.cmd-table .cmd-name{font-family:'Cascadia Code','Fira Code','Consolas',monospace;font-size:12px;color:var(--accent);font-weight:500}
.cmd-table .cmd-desc{color:var(--text-secondary);font-size:13px}
.cmd-table .cmd-maps{font-size:11px;color:var(--text-muted);line-height:1.5}
.cmd-table .cmd-ex pre{background:var(--code-bg);color:#e0e0e0;padding:8px 12px;border-radius:6px;font-size:11px;margin:4px 0 0;overflow-x:auto;font-family:'Cascadia Code','Fira Code','Consolas',monospace;line-height:1.5}
/* ===== Theme Switcher ===== */
.theme-switcher{padding:12px 16px;border-top:1px solid rgba(255,255,255,.08);flex-shrink:0}
.theme-switcher .label{font-size:11px;color:var(--sidebar-text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;font-weight:600}
.theme-options{display:flex;gap:6px;flex-wrap:wrap}
.theme-btn{width:24px;height:24px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .2s;padding:0;flex-shrink:0}
.theme-btn:hover{transform:scale(1.15)}
.theme-btn.active{border-color:#fff;box-shadow:0 0 0 2px var(--accent)}
.theme-btn-default{background:#1a1a2e}
.theme-btn-emerald{background:#10b981}
.theme-btn-amethyst{background:#8b5cf6}
.theme-btn-ocean{background:#06b6d4}
.theme-btn-rose{background:#e11d48}
.theme-btn-slate{background:#64748b}
.theme-btn-sunset{background:#f97316}
.theme-btn-midnight{background:#38bdf8}
/* ===== Section Jump Index ===== */
.section-jump{display:flex;flex-wrap:wrap;gap:6px 10px;margin-bottom:20px;padding:10px 14px;background:var(--bg-page);border-radius:10px}
.section-jump a{font-size:12px;color:var(--text-secondary);text-decoration:none;padding:3px 10px;border-radius:6px;background:var(--card-bg);border:1px solid var(--card-border);transition:all .15s;white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis}
.section-jump a:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}
/* ===== Responsive ===== */
@media(max-width:900px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);z-index:99}
  .sidebar-overlay.open{display:block}
  .main-content{margin-left:0}
  .welcome{padding:32px 20px}
  .content{padding:20px}
  .api-card-head{padding:16px 16px 10px}
  .api-card-body{padding:12px 16px 16px}
  .back-to-top{bottom:20px;right:20px}
  .menu-toggle{display:flex!important}
}
.menu-toggle{display:none;position:fixed;top:12px;left:12px;z-index:110;width:38px;height:38px;border-radius:8px;background:#1a1a2e;color:#fff;border:none;font-size:20px;cursor:pointer;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.2)}
</style>
</head>
<body>

<button class="menu-toggle" id="menuToggle" aria-label="Toggle sidebar">&#9776;</button>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- ===== Sidebar ===== -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <h1>WebView Bridge</h1>
    <p>API 参考文档</p>
  </div>
  <div class="sidebar-search">
    <input type="text" id="searchInput" placeholder="搜索 API..." autocomplete="off">
  </div>
  <nav class="sidebar-nav" id="sidebarNav"></nav>
  <div class="theme-switcher">
    <div class="label">主题</div>
    <div class="theme-options" id="themeOptions">
      <button class="theme-btn theme-btn-default active" data-theme="default" title="靛蓝" onclick="switchTheme('default')"></button>
      <button class="theme-btn theme-btn-emerald" data-theme="emerald" title="翡翠" onclick="switchTheme('emerald')"></button>
      <button class="theme-btn theme-btn-amethyst" data-theme="amethyst" title="紫晶" onclick="switchTheme('amethyst')"></button>
      <button class="theme-btn theme-btn-ocean" data-theme="ocean" title="海洋" onclick="switchTheme('ocean')"></button>
      <button class="theme-btn theme-btn-rose" data-theme="rose" title="玫瑰" onclick="switchTheme('rose')"></button>
      <button class="theme-btn theme-btn-slate" data-theme="slate" title="石板" onclick="switchTheme('slate')"></button>
      <button class="theme-btn theme-btn-sunset" data-theme="sunset" title="日落" onclick="switchTheme('sunset')"></button>
      <button class="theme-btn theme-btn-midnight" data-theme="midnight" title="夜空" onclick="switchTheme('midnight')"></button>
    </div>
  </div>
</aside>

<!-- ===== Main Content ===== -->
<div class="main-content">

  <!-- Welcome -->
  <section class="welcome">
    <h1>WebView Bridge API</h1>
    <p>WebView2 环境中 JavaScript 与宿主通信的完整 API 参考。涵盖了通用控件操作、画布操作、图标辅助、消息通知以及各控件的专用操作方法。</p>
    <div class="stats" id="statsContainer"></div>
  </section>

  <!-- Content -->
  <div class="content" id="content"></div>

  <!-- Footer -->
  <div class="footer">WebView Bridge API 文档 &mdash; 自动生成</div>
</div>

<!-- ===== Back to Top ===== -->
<button class="back-to-top" id="backToTop" title="返回顶部">&uarr;</button>

<script>
(function() {
  'use strict';

  var D = API_DATA;
  var sidebarNav = document.getElementById('sidebarNav');
  var contentEl = document.getElementById('content');
  var searchInput = document.getElementById('searchInput');
  var backToTop = document.getElementById('backToTop');
  var menuToggle = document.getElementById('menuToggle');
  var sidebarOverlay = document.getElementById('sidebarOverlay');

  /* ---------- helpers ---------- */
  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ---------- build sidebar ---------- */
  function buildSidebar() {
    var html = '';
    var total = 0;
    var navMap = {};
    D.sectionOrder.forEach(function(k) {
      if (D.docs[k]) {
        var count = D.docs[k].length;
        total += count;
        navMap[k] = count;
      }
    });
    D.nav.forEach(function(group, gi) {
      html += '<div class="nav-group" data-group="' + gi + '">';
      html += '<div class="nav-group-title" onclick="toggleNavGroup(' + gi + ')">';
      html += '<span class="arrow"></span>' + escHtml(group.title) + '</div>';
      html += '<ul class="nav-group-items" id="navGroup' + gi + '">';
      group.keys.forEach(function(k) {
        if (navMap[k]) {
          html += '<li class="nav-item" data-key="' + k + '">';
          html += '<a href="#section-' + k + '" data-key="' + k + '">';
          html += escHtml(D.displayName[k] || k);
          html += '<span class="count">' + navMap[k] + '</span></a></li>';
        }
      });
      html += '</ul></div>';
    });
    sidebarNav.innerHTML = html;
    return total;
  }

  /* global for onclick */
  window.toggleNavGroup = function(gi) {
    var title = sidebarNav.querySelector('[data-group="' + gi + '"] .nav-group-title');
    var items = document.getElementById('navGroup' + gi);
    if (!title || !items) return;
    title.classList.toggle('collapsed');
    items.classList.toggle('collapsed');
    if (items.classList.contains('collapsed')) {
      items.style.maxHeight = '0';
    } else {
      items.style.maxHeight = items.scrollHeight + 'px';
    }
  };

  /* ---------- build sections ---------- */
  function buildSections() {
    var html = '';
    D.sectionOrder.forEach(function(k) {
      // --- iconmap special section ---
      if (k === 'iconmap') {
        var iconList = D.iconMap || [];
        html += '<section class="section" id="section-iconmap">';
        html += '<div class="section-header"><h2>' + escHtml(D.displayName.iconmap) + '</h2>';
        html += '<span class="section-count">' + iconList.length + ' 个映射</span></div>';
        html += '<p style="margin-bottom:12px;color:var(--text-secondary);font-size:14px">IconManager 支持的图标占位符与 emoji 对应关系。在文本中使用 <code>[NAME]</code> 或 <code>{NAME}</code> 格式即可自动转换。</p>';
        html += '<div class="icon-search"><input type="text" id="iconSearchInput" placeholder="搜索图标占位符或 emoji..." oninput="filterIcons(this.value)"></div>';
        html += '<div class="icon-count">共 <strong>' + iconList.length + '</strong> 个映射</div>';
        html += '<table class="icon-table" id="iconTable"><thead><tr><th style="width:60px">Emoji</th><th>占位符</th><th>别名</th></tr></thead><tbody id="iconTbody">';

        // Group by emoji, collect aliases
        var seenEmoji = {};
        iconList.forEach(function(row) {
          var emojiKey = row[1];
          if (seenEmoji[emojiKey]) {
            seenEmoji[emojiKey] += ', ' + row[0];
          } else {
            seenEmoji[emojiKey] = row[0];
          }
        });
        var emojiKeys = Object.keys(seenEmoji);
        emojiKeys.forEach(function(ek) {
          var aliases = seenEmoji[ek];
          var mainAlias = aliases.split(', ')[0];
          html += '<tr data-search="' + escHtml(aliases.toLowerCase()) + ' ' + ek + '">';
          html += '<td class="emoji-cell"><code>' + ek + '</code></td>';
          html += '<td><code>[' + escHtml(mainAlias) + ']</code></td>';
          html += '<td class="alias-cell">' + escHtml(aliases) + '</td></tr>';
        });
        html += '</tbody></table></section>';
        return;
      }

      // --- commands special section ---
      if (k === 'commands') {
        var cmdList = D.commands || [];
        html += '<section class="section" id="section-commands">';
        html += '<div class="section-header"><h2>' + escHtml(D.displayName.commands) + '</h2>';
        html += '<span class="section-count">' + cmdList.length + ' 个命令</span></div>';
        html += '<p style="margin-bottom:12px;color:var(--text-secondary);font-size:14px">通过 <code>window.chrome.webview.postMessage(JSON)</code> 发送命令，由 <code>dispatchCommand</code> 统一处理。接收字段为 <code>command</code> 或 <code>cmd</code>。</p>';
        html += '<table class="cmd-table"><thead><tr><th style="width:140px">命令名</th><th>功能</th><th style="width:220px">参数映射</th><th>示例</th></tr></thead><tbody>';
        cmdList.forEach(function(cmd) {
          html += '<tr>';
          html += '<td><span class="cmd-name">' + escHtml(cmd.cmd) + '</span></td>';
          html += '<td class="cmd-desc">' + escHtml(cmd.desc) + '</td>';
          html += '<td class="cmd-maps">' + escHtml(cmd.maps) + '</td>';
          html += '<td class="cmd-ex"><pre>' + escHtml(cmd.ex) + '</pre></td></tr>';
        });
        html += '</tbody></table></section>';
        return;
      }

      // --- normal API sections ---
      var items = D.docs[k];
      if (!items || !items.length) return;
      var name = D.displayName[k] || k;
      html += '<section class="section" id="section-' + k + '">';
      html += '<div class="section-header">';
      html += '<h2>' + escHtml(name) + '</h2>';
      html += '<span class="section-count">' + items.length + ' 个 API</span>';
      html += '</div>';

      // Jump index for sections with many methods
      if (items.length > 3) {
        html += '<div class="section-jump">';
        items.forEach(function(api, idx) {
          var titleMatch = api.desc.match(/<span class="desctile">([^<]+)<\/span>/);
          var chTitle = titleMatch ? titleMatch[1] : '方法' + (idx + 1);
          html += '<a href="javascript:void(0)" onclick="document.getElementById(\'card-' + k + '-' + idx + '\').scrollIntoView({behavior:\'smooth\',block:\'start\'})">' + escHtml(chTitle) + '</a>';
        });
        html += '</div>';
      }
      items.forEach(function(api, idx) {
        html += '<div class="api-card" id="card-' + k + '-' + idx + '">';
        html += '<div class="api-card-head">';
        /* Extract Chinese title from desc */
        var titleMatch = api.desc.match(/<span class="desctile">([^<]+)<\/span>/);
        var chTitle = titleMatch ? titleMatch[1] : '';
        if (chTitle) {
          html += '<div class="api-card-title">' + escHtml(chTitle) + '</div>';
        }
        html += '<div class="api-card-signature">' + api.sig + '</div>';
        html += '</div>';
        html += '<div class="api-card-body">';
        /* Description */
        html += '<div class="api-card-desc">' + api.desc + '</div>';
        /* Params */
        if (api.params && api.params.length) {
          html += '<div class="api-params">';
          html += '<div class="label">参数</div>';
          html += '<table><thead><tr><th>名称</th><th>类型</th><th>说明</th></tr></thead><tbody>';
          api.params.forEach(function(p) {
            html += '<tr>';
            html += '<td><code>' + escHtml(p.n) + '</code></td>';
            var typeHtml = '<span class="param-type">' + escHtml(p.t) + '</span>';
            if (p.t.indexOf('optional') >= 0) {
              typeHtml += '<span class="param-optional">(可选)</span>';
            }
            html += '<td>' + typeHtml + '</td>';
            html += '<td>' + escHtml(p.d) + '</td>';
            html += '</tr>';
          });
          html += '</tbody></table></div>';
        }
        /* Returns */
        html += '<div class="api-returns">';
        html += '<div class="label">返回值</div>';
        html += '<span class="val">' + escHtml(api.ret) + '</span>';
        html += '</div>';
        /* Code Examples */
        var hasApi = api.exApi && api.exApi.trim();
        var hasCmd = api.exCmd && api.exCmd.trim() && api.exCmd !== '{}';
        if (hasApi || hasCmd) {
          html += '<div class="api-examples">';
          html += '<div class="tabs" id="tabs-' + k + '-' + idx + '">';
          var tabId = 'tab-' + k + '-' + idx;
          var firstActive = true;
          if (hasApi) {
            html += '<button class="tab-btn active" data-tab="' + tabId + '-api" onclick="switchTab(\'' + tabId + '-api\',\'' + tabId + '\')">JavaScript</button>';
            firstActive = false;
          }
          if (hasCmd) {
            var cls = firstActive ? 'tab-btn active' : 'tab-btn';
            html += '<button class="' + cls + '" data-tab="' + tabId + '-cmd" onclick="switchTab(\'' + tabId + '-cmd\',\'' + tabId + '\')">Command</button>';
          }
          html += '</div>';
          if (hasApi) {
            html += '<div class="tab-content active" id="' + tabId + '-api">';
            html += '<pre><code class="language-javascript">' + escHtml(api.exApi.trim()) + '</code></pre>';
            html += '<button class="copy-btn" onclick="copyCode(this,\'' + tabId + '-api\')">复制</button>';
            html += '</div>';
          }
          if (hasCmd) {
            html += '<div class="tab-content' + (hasApi ? '' : ' active') + '" id="' + tabId + '-cmd">';
            html += '<pre><code class="language-json">' + escHtml(api.exCmd.trim()) + '</code></pre>';
            html += '<button class="copy-btn" onclick="copyCode(this,\'' + tabId + '-cmd\')">复制</button>';
            html += '</div>';
          }
          html += '</div>';
        }
        html += '</div></div>';
      });
      html += '</section>';
    });
    contentEl.innerHTML = html;
  }

  /* ---------- stats ---------- */
  function buildStats(total) {
    var sectionCount = 0;
    D.sectionOrder.forEach(function(k) {
      if (k === 'iconmap' && D.iconMap && D.iconMap.length) { sectionCount++; }
      else if (k === 'commands' && D.commands && D.commands.length) { sectionCount++; }
      else if (D.docs[k] && D.docs[k].length) sectionCount++;
    });
    var miscCount = (D.iconMap ? D.iconMap.length : 0) + (D.commands ? D.commands.length : 0);
    document.getElementById('statsContainer').innerHTML =
      '<div class="stat-item"><span class="num">' + (total + miscCount) + '</span><span class="lbl">API 方法</span></div>' +
      '<div class="stat-item"><span class="num">' + sectionCount + '</span><span class="lbl">分类</span></div>' +
      '<div class="stat-item"><span class="num">' + D.nav.length + '</span><span class="lbl">导航组</span></div>';
  }

  /* ---------- tab switching ---------- */
  window.switchTab = function(tabId, prefix) {
    var tabs = document.querySelectorAll('[id^="' + prefix + '"]');
    tabs.forEach(function(el) {
      if (el.classList.contains('tab-content')) {
        el.classList.toggle('active', el.id === tabId);
      }
      if (el.classList.contains('tab-btn')) {
        el.classList.toggle('active', el.dataset.tab === tabId);
      }
    });
  };

  /* ---------- copy code ---------- */
  window.copyCode = function(btn, contentId) {
    var pre = document.getElementById(contentId);
    if (!pre) return;
    var code = pre.querySelector('code');
    var text = code ? code.textContent : pre.textContent;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() {
        showCopied(btn);
      }).catch(function() {
        fallbackCopy(text, btn);
      });
    } else {
      fallbackCopy(text, btn);
    }
  };

  function fallbackCopy(text, btn) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); showCopied(btn); } catch(e) {}
    document.body.removeChild(ta);
  }

  function showCopied(btn) {
    btn.textContent = '已复制';
    btn.classList.add('copied');
    setTimeout(function() {
      btn.textContent = '复制';
      btn.classList.remove('copied');
    }, 1800);
  }

  /* ---------- hash persistence ---------- */
  function scrollToHash() {
    var hash = location.hash;
    if (!hash) return;
    var target = document.querySelector(hash);
    if (target) {
      setTimeout(function() {
        target.scrollIntoView({behavior:'smooth', block:'start'});
      }, 300);
    }
  }

  /* ---------- highlight active nav ---------- */
  function updateActiveNav() {
    var hash = location.hash || '#section-' + (D.sectionOrder[0] || '');
    var links = sidebarNav.querySelectorAll('.nav-item a');
    links.forEach(function(a) {
      a.classList.toggle('active', a.getAttribute('href') === hash);
    });
  }

  /* ---------- search ---------- */
  searchInput.addEventListener('input', function() {
    var q = this.value.trim().toLowerCase();
    var allItems = sidebarNav.querySelectorAll('.nav-item');
    var allGroups = sidebarNav.querySelectorAll('.nav-group');
    if (!q) {
      allItems.forEach(function(item) { item.classList.remove('hidden'); });
      allGroups.forEach(function(g) { g.style.display = ''; });
      return;
    }
    allItems.forEach(function(item) {
      var key = item.dataset.key;
      var name = (D.displayName[key] || key || '').toLowerCase();
      var matched = false;
      if (name.indexOf(q) >= 0) {
        matched = true;
      } else if (key === 'iconmap' && D.iconMap) {
        // search icon map entries
        for (var i = 0; i < D.iconMap.length; i++) {
          var row = D.iconMap[i];
          if ((row[0] || '').toLowerCase().indexOf(q) >= 0 || (row[1] || '').toLowerCase().indexOf(q) >= 0) {
            matched = true;
            break;
          }
        }
      } else if (key === 'commands' && D.commands) {
        for (var i = 0; i < D.commands.length; i++) {
          var cmd = D.commands[i];
          if ((cmd.cmd || '').toLowerCase().indexOf(q) >= 0 || (cmd.desc || '').toLowerCase().indexOf(q) >= 0) {
            matched = true;
            break;
          }
        }
      } else {
        var docs = D.docs[key];
        if (docs) {
          for (var i = 0; i < docs.length; i++) {
            var sig = docs[i].sig || '';
            var desc = docs[i].desc || '';
            if (sig.toLowerCase().indexOf(q) >= 0 || desc.toLowerCase().indexOf(q) >= 0) {
              matched = true;
              break;
            }
          }
        }
      }
      item.classList.toggle('hidden', !matched);
    });
    allGroups.forEach(function(g) {
      var visible = g.querySelectorAll('.nav-item:not(.hidden)').length > 0;
      g.style.display = visible ? '' : 'none';
    });
  });

  /* ---------- back to top ---------- */
  var scrollTimer;
  window.addEventListener('scroll', function() {
    if (scrollTimer) clearTimeout(scrollTimer);
    scrollTimer = setTimeout(function() {
      backToTop.classList.toggle('visible', window.scrollY > 400);
    }, 50);
  });
  backToTop.addEventListener('click', function() {
    window.scrollTo({top:0, behavior:'smooth'});
  });

  /* ---------- mobile menu ---------- */
  menuToggle.addEventListener('click', function() {
    document.getElementById('sidebar').classList.toggle('open');
    sidebarOverlay.classList.toggle('open');
  });
  sidebarOverlay.addEventListener('click', function() {
    document.getElementById('sidebar').classList.remove('open');
    sidebarOverlay.classList.remove('open');
  });

  /* ---------- nav click -> close mobile ---------- */
  sidebarNav.addEventListener('click', function(e) {
    var link = e.target.closest('a');
    if (link && link.getAttribute('href') && link.getAttribute('href').charAt(0) === '#') {
      document.getElementById('sidebar').classList.remove('open');
      sidebarOverlay.classList.remove('open');
    }
  });

  /* ---------- hashchange ---------- */
  window.addEventListener('hashchange', function() {
    updateActiveNav();
    scrollToHash();
  });

  /* ---------- init highlight.js ---------- */
  function highlightAll() {
    document.querySelectorAll('pre code').forEach(function(block) {
      hljs.highlightElement(block);
    });
  }

  /* ---------- theme switcher ---------- */
  window.switchTheme = function(theme) {
    if (theme === 'default') {
      document.body.removeAttribute('data-theme');
    } else {
      document.body.setAttribute('data-theme', theme);
    }
    var btns = document.querySelectorAll('.theme-btn');
    btns.forEach(function(btn) {
      btn.classList.toggle('active', btn.dataset.theme === theme);
    });
    try { localStorage.setItem('wb-api-theme', theme); } catch(e) {}
  };

  /* ---------- icon filter ---------- */
  window.filterIcons = function(q) {
    q = q.toLowerCase().trim();
    var rows = document.querySelectorAll('#iconTbody tr');
    rows.forEach(function(row) {
      var searchData = (row.getAttribute('data-search') || '').toLowerCase();
      row.style.display = (!q || searchData.indexOf(q) >= 0) ? '' : 'none';
    });
  };

  /* ---------- init ---------- */
  var totalApis = buildSidebar();
  buildSections();
  buildStats(totalApis);
  updateActiveNav();
  scrollToHash();

  /* restore saved theme */
  try {
    var saved = localStorage.getItem('wb-api-theme');
    if (saved) switchTheme(saved);
  } catch(e) {}

  /* highlight after render */
  setTimeout(highlightAll, 100);

  /* re-highlight when tabs switch (observer for new code blocks) */
  var origSwitch = window.switchTab;
  window.switchTab = function(tabId, prefix) {
    origSwitch(tabId, prefix);
    setTimeout(function() {
      var content = document.getElementById(tabId);
      if (content) {
        content.querySelectorAll('pre code').forEach(function(block) {
          hljs.highlightElement(block);
        });
      }
    }, 50);
  };

})();
</script>
</body>
</html>
