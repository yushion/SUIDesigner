name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# 赋予 GitHub Pages 部署权限
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm ci
      # 直接用 vite build，跳过 vue-tsc 类型检查避免 CI 中因 TS 报错导致部署失败
      - run: npx vite build
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
