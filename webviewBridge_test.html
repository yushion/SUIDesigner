var TESTS = [];
function addTest(ns, name, args, checker) {
  TESTS.push({ ns: ns, name: name, args: args, checker: checker });
}

function bindApi(p) { return window.webviewBridge; }

function S(id) { return '#' + id; }

var N, api, wb;
function initTests() {
  wb = window.webviewBridge;
  api = wb.api;

  // ---------- 通用 API(public: 31个) ----------
  N = '通用API';
  addTest(N,'webviewBridge.api.setValue',[S('input_1'),'test'],function(r){return r===true});
  addTest(N,'webviewBridge.api.getValue',[S('input_1')],function(r){return r==='test'});

// ========================================================================
// 3. 测试引擎
// ========================================================================
var results = {}, nsOrder = [], total = 0, pass = 0, fail = 0, skip = 0;

function runTests() {
  TESTS.forEach(function(t){
    if(!results[t.ns]){ results[t.ns]=[]; nsOrder.push(t.ns); }
  });
  total = TESTS.length;
  renderSummary(); renderFilterBar();

  TESTS.forEach(function(t, idx){
    var parts = t.name.split('.'), fn = window;
    for(var i=2;i<parts.length;i++){ fn = fn ? fn[parts[i]] : undefined; }
    var r = { ns:t.ns, name:t.name, args:t.args, status:'skip', detail:'' };
    try {
      if(typeof fn !== 'function'){ r.status='skip'; r.detail='函数不存在'; }
      else {
        var rs = fn.apply(null, t.args);
        r.status = t.checker(rs) ? 'pass' : 'fail';
        r.detail = '返回值: ' + JSON.stringify(rs);
      }
    } catch(e){ r.status='fail'; r.detail='异常: '+e.message; }
    results[t.ns].push(r);
    if(r.status==='pass') pass++; else if(r.status==='fail') fail++; else skip++;
    updateProgress(idx+1, total);
  });
  renderSummary(); renderResults(); updateProgress(total, total);
}

function renderSummary(){
  document.getElementById('summary').innerHTML = [
    '<div class="summary-item"><div class="num total">'+total+'</div><div class="lbl">总计</div></div>',
    '<div class="summary-item"><div class="num pass">'+pass+'</div><div class="lbl">通过</div></div>',
    '<div class="summary-item"><div class="num fail">'+fail+'</div><div class="lbl">失败</div></div>',
    '<div class="summary-item"><div class="num skip">'+skip+'</div><div class="lbl">跳过</div></div>'
  ].join('');
}
function updateProgress(cur,total){ document.getElementById('progress-fill').style.width = Math.min(100,Math.round(cur/total*100))+'%'; }
function renderFilterBar(){
  var h='<button class="active" onclick="filterGroup(\'all\',this)">全部 ('+total+')</button>';
  nsOrder.forEach(function(ns){ h+='<button onclick="filterGroup(\''+ns+'\',this)">'+ns+' ('+results[ns].length+')</button>'; });
  document.getElementById('filterBar').innerHTML = h;
}
function filterGroup(ns,btn){
  document.querySelectorAll('.filter-bar button').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');
  document.querySelectorAll('.test-group').forEach(function(g){ g.style.display=(ns==='all'||g.dataset.ns===ns)?'':'none'; });
}
function renderResults(){
  var html='';
  nsOrder.forEach(function(ns){
    var items=results[ns], passC=items.filter(function(i){return i.status==='pass'}).length;
    var failC=items.filter(function(i){return i.status==='fail'}).length, skipC=items.filter(function(i){return i.status==='skip'}).length;
    html+='<div class="test-group" data-ns="'+ns+'"><div class="group-header" onclick="toggleGroup(this)">';
    html+='<span>'+ns+' <span class="group-stats">✅'+passC+' ❌'+failC+' ⏭'+skipC+'</span></span>';
    html+='<span>'+items.length+'个</span></div><div class="group-body">';
    items.forEach(function(r){
      var sc=r.status;
      html+='<div class="test-row" onclick="showDetail(\''+r.name+'\',\''+r.detail.replace(/'/g,"\\'")+'\')">';
      html+='<div class="status '+sc+'">'+(sc==='pass'?'✅通过':sc==='fail'?'❌失败':'⏭跳过')+'</div>';
      html+='<div class="api-name">'+r.name+'</div><div class="api-args">'+JSON.stringify(r.args)+'</div>';
      html+='<div class="result">'+(sc==='fail'?'<span class="err">✘</span>':sc==='pass'?'<span class="ok">✔</span>':'—')+'</div></div>';
    });
    html+='</div></div>';
  });
  document.getElementById('results').innerHTML = html;
}
function toggleGroup(h){ var b=h.nextElementSibling; b.style.display=b.style.display==='none'?'':'none'; }
function showDetail(n,d){
  document.getElementById('detailTitle').textContent=n;
  document.getElementById('detailBody').textContent=d;
  document.getElementById('detailDialog').style.display='block';
  document.getElementById('detailOverlay').style.display='block';
}
function closeDetail(){
  document.getElementById('detailDialog').style.display='none';
  document.getElementById('detailOverlay').style.display='none';
}
document.getElementById('detailOverlay').onclick=closeDetail;
